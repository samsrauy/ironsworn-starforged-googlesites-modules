<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link rel="stylesheet" href="https://samsrauy.github.io/void-link/css/style.css">
    <style>
        body { background: #050508; color: #00ff9d; font-family: monospace; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #loading-screen { text-align: center; font-size: 1.2rem; letter-spacing: 4px; }
        .spinner { border: 3px solid #1a1c23; border-top: 3px solid #00ff9d; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #setup-box { border: 1px solid #00ff9d; padding: 40px; background: #0b0d12; text-align: center; }
        input { background: #161922; border: 1px solid #454d5d; color: #00ff9d; padding: 10px; margin: 15px 0; width: 250px; text-align: center; }
        button { background: #00ff9d; border: none; color: #000; padding: 12px 24px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="setup-box" style="display:none;">
        <div style="color: #00ff9d; margin-bottom: 10px;">NEURAL LINK REQUIRED</div>
        <input type="text" id="pilot-name" placeholder="ENTER CALLSIGN" autocomplete="off" />
        <br>
        <button onclick="requestUplink()">INITIALIZE CONNECTION</button>
    </div>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="status-text">ESTABLISHING SECURE UPLINK...</div>
    </div>

    <div id="starforged-terminal" style="display: none; width: 100vw; height: 100vh;"></div>

    <script>
      const MY_REPO = "https://samsrauy.github.io/void-link";
      window.charId = "<?= charId ?>"; 

      // gLink Bridge for sync.js
      window.gLink = {
        saveStatServer: (id, f, v) => google.script.run.saveStatServer(id, f, v),
        loadStatsServer: (id) => google.script.run.withSuccessHandler(res => { if(window.onStatsLoaded) onStatsLoaded(res); }).loadStatsServer(id),
        logServer: (id, msg) => google.script.run.logServer(id, msg)
      };

      async function bootSystem() {
          const status = document.getElementById('status-text');
          
          if (!window.charId || window.charId === "" || window.charId === "null") {
              document.getElementById('loading-screen').style.display = 'none';
              document.getElementById('setup-box').style.display = 'block';
              return;
          }

          try {
              status.innerText = "FETCHING TERMINAL CORE...";
              const res = await fetch(`${MY_REPO}/void-link-term.html`);
              const mount = document.getElementById('starforged-terminal');
              mount.innerHTML = await res.text();

              status.innerText = "LINKING DATASWORN ARCHIVES...";
              await injectScript('js/datasworn.js');
              await injectScript('js/sync.js');

              // Wait for sub-modules to finish registering functions
              if (typeof bootTerminal === 'function') {
                  status.innerText = "CALIBRATING NAV-SYSTEMS...";
                  await bootTerminal(); 
              }

              // Final Reveal
              document.getElementById('loading-screen').style.display = 'none';
              mount.style.display = 'block';

          } catch (e) {
              status.innerHTML = `<span style="color:#ff0055">FATAL LINK ERROR: ${e.message}</span>`;
          }
      }

      async function injectScript(path) {
          const r = await fetch(`${MY_REPO}/${path}`);
          const s = document.createElement('script');
          s.textContent = await r.text();
          document.head.appendChild(s); // Append to head for global scope accessibility
      }

      function requestUplink() {
          const name = document.getElementById('pilot-name').value.trim();
          if (name) {
              google.script.run.withSuccessHandler(url => window.top.location.href = url + "?id=" + encodeURIComponent(name)).getAppUrl();
          }
      }

      bootSystem();
    </script>
</body>
</html>
