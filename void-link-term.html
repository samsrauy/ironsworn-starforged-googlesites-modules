<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        :root { --neon: #00ff9d; --panel: #0b0d12; --border: #1a1c23; }
        #terminal-grid { 
            display: grid; 
            grid-template-columns: 380px 1fr; 
            grid-template-rows: 60px 1fr 350px; 
            height: 100vh; gap: 2px; background: var(--border); 
        }
        .header-bar { 
            grid-column: 1 / -1; background: var(--panel); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; border-bottom: 1px solid var(--neon); 
        }
        .module-frame { background: var(--panel); overflow-y: auto; border: 1px solid var(--border); }
        #frame-char { grid-row: 2 / 4; }
        #frame-map { grid-column: 2; grid-row: 2; }
        #frame-journal { grid-column: 2; grid-row: 3; }
        .nav-btn { background: none; border: 1px solid var(--neon); color: var(--neon); padding: 5px 12px; cursor: pointer; font-family: inherit; margin-left: 10px; font-size: 12px; }
        .nav-btn:hover { background: var(--neon); color: #000; }
    </style>
</head>
<body>

<div id="terminal-grid">
    <div class="header-bar">
        <div id="char-display">PILOT: ---</div>
        <div>
            <button class="nav-btn" onclick="toggleAssets()">☰ ASSETS</button>
            <span style="margin-left:20px; letter-spacing:2px; color:var(--neon); opacity: 0.7;">VOID-LINK // NAV-OS</span>
        </div>
    </div>
    
    <div id="frame-char" class="module-frame"></div>
    <div id="frame-map" class="module-frame"></div>
    <div id="frame-journal" class="module-frame"></div>
    
    <div id="frame-assets" style="display:none; position:fixed; right:0; top:60px; width:400px; height:calc(100% - 60px); background:var(--panel); border-left:1px solid var(--neon); z-index:100;"></div>
</div>

<script>
    const GITHUB_BASE = "https://samsrauy.github.io/void-link/modules/";

    function toggleAssets() {
        const f = document.getElementById('frame-assets');
        if (f.style.display === 'none') {
            f.style.display = 'block';
            loadModule('frame-assets', 'asset-browser/asset-browser.html');
        } else {
            f.style.display = 'none';
        }
    }

    async function loadModule(id, path) {
        const target = document.getElementById(id);
        const fullPath = path.startsWith('http') ? path : GITHUB_BASE + path;
        
        const response = await fetch(fullPath);
        const html = await response.text();
        target.innerHTML = html;

        // Create a sequence of promises to ensure scripts are executed and ready
        const scripts = Array.from(target.querySelectorAll('script'));
        for (const oldScript of scripts) {
            await new Promise((resolve, reject) => {
                const newScript = document.createElement('script');
                if (oldScript.src) {
                    newScript.src = oldScript.src;
                    newScript.onload = resolve;
                    newScript.onerror = reject;
                } else {
                    newScript.textContent = oldScript.textContent;
                    // Force inline scripts into the head to register functions globally
                    document.head.appendChild(newScript);
                    resolve();
                }
                if (oldScript.src) document.head.appendChild(newScript);
            });
        }
    }

    async function bootTerminal() {
        if(window.charId) {
            const display = document.getElementById('char-display');
            if(display) display.innerText = `PILOT: ${window.charId.toUpperCase()}`;
        }
        
        // This 'await' is the key: it blocks the loading screen until all 3 are 100% ready
        await Promise.all([
            loadModule('frame-char', 'character-sheet/character-sheet.html'),
            loadModule('frame-map', 'map/map.html'),
            loadModule('frame-journal', 'journal/journal.html')
        ]);

        console.log("Terminal: Neural Link Established. All Modules Hot.");
        return true;
    }
</script>
</body>
</html>
