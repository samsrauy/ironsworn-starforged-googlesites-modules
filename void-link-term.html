<div id="terminal-grid">
    <div class="header-bar">
        <h2>STARFORGED // NAV-OS</h2>
        <div id="char-display">ID: AWAITING...</div>
        <button onclick="toggleAssets()">MANIFEST</button>
    </div>
    
    <iframe id="frame-char" class="module-frame" src=""></iframe>
    <iframe id="frame-map" class="module-frame" src=""></iframe>
    <iframe id="frame-journal" class="module-frame" src=""></iframe>
</div>

<div id="asset-drawer">
    <button onclick="toggleAssets()" style="margin: 10px; width: calc(100% - 20px);">CLOSE MANIFEST</button>
    <iframe id="frame-assets" class="module-frame" src="" style="height: calc(100% - 60px);"></iframe>
</div>

<script>
    // Boot function relies on the global window.charId provided by the host
    function bootTerminal() {
        if (!window.charId) {
            console.error("Critical Failure: No Character ID found.");
            document.getElementById('terminal-grid').innerHTML = "<div style='color:red; padding:20px;'>FATAL ERROR: CHARACTER ID MISSING. ACCESS DENIED.</div>";
            return;
        }

        document.getElementById('char-display').innerText = `ID: ${window.charId.toUpperCase()}`;

        // Route the iframes
        const query = `?id=${encodeURIComponent(window.charId)}`;
        document.getElementById('frame-char').src = `modules/character-sheet/character-sheet.html${query}`;
        document.getElementById('frame-map').src = `modules/map/map.html${query}`;
        document.getElementById('frame-journal').src = `modules/journal/journal.html${query}`;
        document.getElementById('frame-assets').src = `modules/asset-browser/asset-browser.html${query}`;
    }

    function toggleAssets() {
        document.getElementById('asset-drawer').classList.toggle('open');
    }
</script>
