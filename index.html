<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>STARFORGED // VOID-LINK TERMINAL</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #050508; color: #00ff9d; font-family: 'Exo 2', sans-serif; overflow: hidden; }
        
        /* Login Screen */
        #setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: radial-gradient(circle, #0a0a1a 0%, #000 100%); }
        .setup-box { background: rgba(0, 255, 153, 0.05); border: 1px solid #00ff9d; padding: 40px; border-radius: 8px; text-align: center; box-shadow: 0 0 20px rgba(0, 255, 153, 0.1); }
        input { background: #000; border: 1px solid #00ff9d; color: #00ff9d; padding: 10px; margin: 10px 0; width: 300px; font-family: 'Share Tech Mono', monospace; outline: none; }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        .boot-btn { background: #00ff9d; color: #000; border: none; padding: 12px 25px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .init-btn { background: transparent; color: #00ff9d; border: 1px solid #00ff9d; padding: 12px 25px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* Main Dashboard Grid */
        #dashboard { 
            display: none; 
            grid-template-columns: 350px 1fr 350px; 
            grid-template-rows: 1fr 300px; 
            height: 100vh; gap: 10px; padding: 10px; box-sizing: border-box; 
        }
        iframe { width: 100%; height: 100%; border: 1px solid #1a1c23; background: #0b0d12; border-radius: 4px; }
        
        .grid-char { grid-row: 1 / 3; }
        .grid-map { grid-column: 2; grid-row: 1; }
        .grid-journal { grid-column: 2; grid-row: 2; }
        .grid-assets { grid-column: 3; grid-row: 1; }
        .grid-oracle { grid-column: 3; grid-row: 2; }

        /* Menu System - BOTTOM LEFT */
        #menu-toggle {
            position: fixed; bottom: 20px; left: 20px; z-index: 100;
            background: #00ff9d; color: #000; border: none; padding: 10px 20px;
            font-weight: bold; cursor: pointer; border-radius: 4px; box-shadow: 0 0 15px rgba(0,255,153,0.4);
            letter-spacing: 1px; font-size: 0.8rem;
        }
        #side-menu {
            position: fixed; top: 0; left: -500px; width: 450px; height: 100vh;
            background: #050508; border-right: 1px solid #00ff9d; z-index: 99;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column;
        }
        #side-menu.open { left: 0; }
        .menu-tabs { display: flex; background: #111; border-bottom: 1px solid #333; }
        .menu-tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-size: 0.7rem; opacity: 0.5; color: #fff; }
        .menu-tab.active { opacity: 1; color: #00ff9d; background: rgba(0,255,153,0.05); font-weight: bold; }
        .menu-frame-container { flex-grow: 1; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-box">
            <h1 style="letter-spacing: 5px; margin-bottom: 5px;">VOID-LINK</h1>
            <p style="font-size: 0.6rem; opacity: 0.4; margin-bottom: 30px;">NEURAL INTERFACE TERMINAL v3.3</p>
            
            <input type="text" id="sheet-input" placeholder="ENTER SPREADSHEET ID">
            <br>
            <input type="text" id="name-input" placeholder="ENTER CHARACTER NAME">
            <br>
            <div class="btn-group">
                <button class="init-btn" onclick="openCreator()">Initialize Identity</button>
                <button class="boot-btn" onclick="establishLink()">Boot Terminal</button>
            </div>
        </div>
    </div>

    <button id="menu-toggle" onclick="toggleMenu()" style="display:none;">☰ LIBRARY</button>

    <div id="side-menu">
        <div class="menu-tabs">
            <div id="tab-comp" class="menu-tab active" onclick="switchMenu('compendium')">COMPENDIUM</div>
            <div id="tab-brow" class="menu-tab" onclick="switchMenu('asset-browser')">ASSET BROWSER</div>
        </div>
        <div class="menu-frame-container">
            <iframe id="frame-menu-content"></iframe>
        </div>
    </div>

    <div id="dashboard">
        <div class="grid-char"><iframe id="frame-char"></iframe></div>
        <div class="grid-map"><iframe id="frame-map"></iframe></div>
        <div class="grid-journal"><iframe id="frame-journal"></iframe></div>
        <div class="grid-assets"><iframe id="frame-tracker"></iframe></div>
        <div class="grid-oracle"><iframe id="frame-oracle"></iframe></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const sheetId = params.get('sheet');
        const charName = params.get('id');

        function init() {
            if (sheetId && charName) {
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'grid';
                document.getElementById('menu-toggle').style.display = 'block';

                const query = `?sheet=${sheetId}&id=${charName}`;
                document.getElementById('frame-char').src = `modules/character-sheet/index.html${query}`;
                document.getElementById('frame-map').src = `modules/map/index.html${query}`;
                document.getElementById('frame-journal').src = `modules/journal/index.html${query}`;
                document.getElementById('frame-tracker').src = `modules/asset-tracker/index.html${query}`;
                document.getElementById('frame-oracle').src = `modules/secret-oracle/index.html${query}`;
                
                switchMenu('compendium');
            }
        }

        function toggleMenu() {
            const menu = document.getElementById('side-menu');
            menu.classList.toggle('open');
            document.getElementById('menu-toggle').innerText = menu.classList.contains('open') ? '✕ CLOSE' : '☰ LIBRARY';
        }

        function switchMenu(module) {
            if(!sheetId) return;
            const query = `?sheet=${sheetId}&id=${charName}`;
            document.getElementById('frame-menu-content').src = `modules/${module}/index.html${query}`;
            
            document.getElementById('tab-comp').classList.toggle('active', module === 'compendium');
            document.getElementById('tab-brow').classList.toggle('active', module === 'asset-browser');
        }

        function openCreator() {
            const sId = document.getElementById('sheet-input').value.trim();
            if (!sId) {
                alert("Please enter a Spreadsheet ID first to link the identity bank.");
                return;
            }
            // Opens character sheet in creation mode
            window.open(`modules/character-sheet/index.html?sheet=${sId}&mode=create`, '_blank');
        }

        function establishLink() {
            const sId = document.getElementById('sheet-input').value.trim();
            const cName = document.getElementById('name-input').value.trim();
            if (sId && cName) {
                window.location.href = `index.html?sheet=${sId}&id=${cName}`;
            } else {
                alert("VOID ERROR: Credentials incomplete.");
            }
        }

        init();
    </script>
</body>
</html>
