<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <base href="https://YOUR_GITHUB_USERNAME.github.io/YOUR_REPO_NAME/">
    <style>
      body { background-color: #111; color: #00ffcc; font-family: monospace; padding: 2rem; }
    </style>
  </head>
  <body>
    <div id="starforged-terminal">
      <p>Authenticating User Credentials...</p>
      <p>Establishing Secure Link to Central Core...</p>
    </div>

    <script>
      // The Master CDN - Every game pulls the newest UI from here
      const GITHUB_BASE_URL = "https://samsrauy.github.io/void-link/";
      const charId = "<?= charId ?>"; 
      
      if (charId) {
        window.history.replaceState({}, '', '?id=' + charId);
      }

      fetch(`${GITHUB_BASE_URL}/index.html`)
        .then(response => response.text())
        .then(html => {
          document.getElementById('starforged-terminal').innerHTML = html;
          
          const script1 = document.createElement('script');
          script1.src = `${GITHUB_BASE_URL}/js/datasworn.js`;
          document.body.appendChild(script1);

          const script2 = document.createElement('script');
          script2.src = `${GITHUB_BASE_URL}/js/sync.js`;
          document.body.appendChild(script2);
        })
        .catch(err => {
          document.getElementById('starforged-terminal').innerHTML = "<p style='color:red;'>CRITICAL ERROR: Failed to fetch blueprints from Central Core.</p>";
          console.error(err);
        });
    </script>
  </body>
</html>
