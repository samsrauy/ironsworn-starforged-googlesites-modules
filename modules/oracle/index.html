<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { background: #050508; color: #e0e0e0; font-family: 'Courier New', monospace; padding: 15px; }
        .oracle-ui { display: flex; flex-direction: column; gap: 12px; }
        select { background: #111; border: 1px solid var(--border); color: white; padding: 8px; font-size: 0.75rem; width: 100%; }
        .roll-btn { background: var(--accent); color: black; border: none; padding: 10px; font-weight: bold; cursor: pointer; }
        #oracle-result { 
            margin-top: 15px; padding: 15px; background: rgba(255,255,255,0.03);
            border-left: 3px solid var(--accent); min-height: 60px;
        }
        .result-text { font-size: 1.1rem; font-weight: bold; color: var(--accent); }
        .loading-shimmer { font-size: 0.7rem; opacity: 0.5; font-style: italic; }
    </style>
</head>
<body>

    <div class="oracle-ui">
        <div id="status" class="loading-shimmer">Initializing Datasworn Uplink...</div>
        
        <select id="category-select" onchange="populateTables()"></select>
        <select id="table-select"></select>
        
        <button class="roll-btn" onclick="rollDatasworn()">EXECUTE ROLL (d100)</button>

        <div id="oracle-result">
            <div id="res-title" style="font-size:0.6rem; text-transform:uppercase; opacity:0.6;">Result</div>
            <div id="res-body" class="result-text">---</div>
            <div id="res-roll" style="font-size:0.7rem; opacity:0.4; margin-top:5px;"></div>
        </div>
        
        <button id="log-btn" style="display:none; font-size:0.6rem; background:none; color:#888; border:1px solid #444; margin-top:10px; cursor:pointer;" onclick="logResult()">Transmit to History</button>
    </div>

    <script src="../../js/sync.js"></script>
    <script>
        let datasworn = null;
        const DATA_URL = "https://raw.githubusercontent.com/rsek/datasworn/main/bundles/starforged.json";

        async function init() {
            try {
                const response = await fetch(DATA_URL);
                datasworn = await response.json();
                
                document.getElementById('status').innerText = "Datasworn v" + datasworn.ruleset.version + " Loaded";
                
                // Populate Categories (e.g., Space, Planets, People)
                const catSelect = document.getElementById('category-select');
                Object.keys(datasworn.oracles).forEach(catKey => {
                    const cat = datasworn.oracles[catKey];
                    const opt = new Option(cat.name, catKey);
                    catSelect.add(opt);
                });
                
                populateTables();
            } catch (e) {
                document.getElementById('status').innerText = "Uplink Failed: Using Offline Buffer";
                console.error(e);
            }
        }

        function populateTables() {
            const catKey = document.getElementById('category-select').value;
            const tableSelect = document.getElementById('table-select');
            tableSelect.innerHTML = "";
            
            const category = datasworn.oracles[catKey];
            // Datasworn organizes oracles into collections/tables
            Object.keys(category.contents || {}).forEach(tableKey => {
                const table = category.contents[tableKey];
                tableSelect.add(new Option(table.name, tableKey));
            });
        }

        function rollDatasworn() {
            const catKey = document.getElementById('category-select').value;
            const tableKey = document.getElementById('table-select').value;
            const table = datasworn.oracles[catKey].contents[tableKey];
            
            const roll = Math.floor(Math.random() * 100) + 1;
            let resultText = "No result found";

            // Datasworn rows are in an array called 'rows'
            for (let row of table.rows) {
                if (roll >= row.floor && roll <= row.ceiling) {
                    resultText = row.text;
                    break;
                }
            }

            document.getElementById('res-title').innerText = table.name;
            document.getElementById('res-body').innerText = resultText;
            document.getElementById('res-roll').innerText = "Rolled: " + roll;
            document.getElementById('log-btn').style.display = "block";
        }

        async function logResult() {
            const title = document.getElementById('res-title').innerText;
            const body = document.getElementById('res-body').innerText;
            await saveStat(charId, "history_entry", `ORACLE [${title}]: ${body}`);
            alert("Transmission Logged.");
        }

        init();
    </script>
</body>
</html>
