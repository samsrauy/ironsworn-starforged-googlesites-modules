<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { background: #0b0d12; color: #00ff9d; font-family: 'Exo 2', sans-serif; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #1a1c23; padding-bottom: 10px; }
        select { background: #161922; border: 1px solid #00ff9d; color: #00ff9d; padding: 8px; border-radius: 4px; outline: none; cursor: pointer; }
        
        .asset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .asset-card { background: #1a1c23; border: 1px solid #454d5d; border-radius: 8px; padding: 15px; position: relative; display: flex; flex-direction: column; min-height: 320px; }
        .asset-card:hover { border-color: #00ff9d; box-shadow: 0 0 10px rgba(0, 255, 153, 0.1); }
        .asset-card h4 { margin: 0 0 10px 0; color: #00ff9d; text-transform: uppercase; letter-spacing: 1px; }
        .asset-type { font-size: 0.7rem; color: #ff0055; margin-bottom: 10px; font-weight: bold; }
        .ability { font-size: 0.85rem; color: #bcdee7; margin-bottom: 10px; line-height: 1.4; }
        .install-btn { width: 100%; background: #00ff9d; color: #000; border: none; padding: 10px; font-weight: bold; cursor: pointer; margin-top: auto; transition: 0.2s; }
        .install-btn:hover { background: #fff; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="header">
        <h3>NEURAL ASSET REPOSITORY</h3>
        <select id="category-select" onchange="renderAssets(this.value)">
            <option>UPLINKING TO DATA CORE...</option>
        </select>
    </div>
    <div id="asset-grid" class="asset-grid">
        </div>

    <script src="../../js/sync.js"></script>
    <script src="../../js/datasworn.js"></script>

    <script>
        console.log("Asset Browser: System Startup...");

        // Optimized Search: Looks for anything with the 'asset_category' type
        function findInDatasworn(obj, targetType) {
            let results = [];
            if (!obj || typeof obj !== 'object') return results;
            
            // If this object is what we want, grab it
            if (obj.type === targetType) {
                results.push(obj);
            }

            // Iterate through all keys to find nested collections
            for (const key in obj) {
                if (typeof obj[key] === 'object') {
                    results = results.concat(findInDatasworn(obj[key], targetType));
                }
            }
            return results;
        }

        function init() {
            // Check if data is fully loaded
            if (typeof datasworn === 'undefined' || datasworn === null) {
                console.warn("Asset Browser: Data Core null. Retrying...");
                setTimeout(init, 500);
                return;
            }

            console.log("Asset Browser: Neural Link Confirmed. Mapping Assets...");
            
            try {
                // Starforged Assets are usually in datasworn.assets
                // We search the whole object just to be safe
                const categories = findInDatasworn(datasworn, 'asset_category');
                const select = document.getElementById('category-select');
                
                console.log(`Asset Browser: Found ${categories.length} categories.`);

                if (!categories || categories.length === 0) {
                    console.error("Asset Browser: Zero categories found. Checking schema structure...");
                    console.log("Data Keys Available:", Object.keys(datasworn));
                    return;
                }

                // Sort alphabetically for the pilot's convenience
                categories.sort((a, b) => a.name.localeCompare(b.name));

                select.innerHTML = categories.map(cat => 
                    `<option value="${cat._id}">${cat.name.toUpperCase()}</option>`
                ).join('');
                
                renderAssets(categories[0]._id);
            } catch (err) {
                console.error("Asset Browser: Initialization Crash ->", err);
            }
        }

        function renderAssets(catId) {
            // Re-find the category object from the global data
            const categories = findInDatasworn(datasworn, 'asset_category');
            const category = categories.find(c => c._id === catId);
            const grid = document.getElementById('asset-grid');

            if (!category) return;

            // Datasworn assets are stored in a 'contents' or 'assets' object
            const assetList = category.contents || category.assets || {};
            
            grid.innerHTML = Object.values(assetList).map(asset => `
                <div class="asset-card">
                    <div class="asset-type">${category.name}</div>
                    <h4>${asset.name}</h4>
                    <div class="ability"><strong>Requirement:</strong> ${asset.requirement || 'None'}</div>
                    ${asset.abilities ? asset.abilities.map((ab, i) => `
                        <div class="ability" style="opacity: ${i === 0 ? 1 : 0.6}">
                            ● ${ab.text || ab.description || 'Data missing'}
                        </div>
                    `).join('') : 'No abilities defined.'}
                    <button class="install-btn" onclick="claimAsset('${asset._id}', '${asset.name.replace(/'/g, "\\'")}')">INSTALL ASSET</button>
                </div>
            `).join('');
        }

        async function claimAsset(id, name) {
            if (confirm(`Install ${name} to ship systems?`)) {
                if (typeof saveStat === 'function') {
                    await saveStat(charId, "history_entry", `ASSET ACQUIRED: ${name}`);
                    alert(`${name} registered to Neural Link.`);
                }
            }
        }

        init();
        // Start the watch loop
        init();
    </script>
</body>
</html>
