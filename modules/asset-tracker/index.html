<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { background: transparent; color: #e0e0e0; font-family: 'Exo 2', sans-serif; padding: 10px; }
        .asset-card { 
            max-width: 400px; 
            margin: 0 auto;
            border: 1px solid #333; 
            background: rgba(0,0,0,0.9); 
            border-radius: 8px; 
            padding: 18px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .asset-type { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; margin-bottom: 4px; color: var(--accent); }
        .asset-name { font-size: 1.3rem; color: #fff; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .ability-row { 
            display: flex; 
            align-items: flex-start; 
            margin-bottom: 10px; 
            padding: 8px; 
            border-radius: 4px; 
            cursor: pointer;
            transition: 0.2s; 
            background: rgba(255,255,255,0.02);
        }
        .ability-row:hover { background: rgba(255,255,255,0.05); }
        
        .checkbox { 
            width: 18px; height: 18px; border: 2px solid var(--accent); 
            margin-right: 12px; margin-top: 2px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            border-radius: 3px;
        }
        .checkbox.checked::after { 
            content: "✦"; 
            color: var(--accent); 
            font-size: 14px; 
        }
        
        .ability-text { font-size: 0.8rem; line-height: 1.4; opacity: 0.8; }
        
        .tracker-area { 
            margin-top: 15px; 
            padding-top: 15px; 
            border-top: 1px solid #333; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
        }
        .tracker-controls button { 
            padding: 4px 12px; 
            background: #222; 
            border: 1px solid #444; 
            color: white; 
            cursor: pointer;
            font-family: monospace;
            border-radius: 4px;
        }
        .tracker-controls button:hover { border-color: var(--accent); background: #333; }
        #loader { text-align: center; padding: 40px; font-size: 0.8rem; opacity: 0.6; }
    </style>
</head>
<body>

    <div id="loader">ESTABLISHING SENSOR LINK...</div>

    <div id="asset-ui" style="display:none;" class="asset-card">
        <div id="a-type" class="asset-type">Asset</div>
        <div id="a-name" class="asset-name">...</div>
        
        <div id="abilities"></div>

        <div id="tracker-container" class="tracker-area" style="display:none;">
            <span id="tracker-label" style="font-weight: bold; text-transform: uppercase; font-size: 0.65rem; opacity: 0.7;">Condition</span>
            <div class="tracker-controls">
                <button onclick="adjustTracker(-1)">-</button>
                <span id="tracker-val" style="margin: 0 15px; font-family: monospace; font-size: 1.2rem; color: var(--accent);">0</span>
                <button onclick="adjustTracker(1)">+</button>
            </div>
        </div>
    </div>

    <script src="../../js/sync.js"></script>
    <script>
        const assetParams = new URLSearchParams(window.location.search);
        const assetSlug = assetParams.get('asset'); 
        // VERIFIED WORKING URL
        const DATA_URL = "https://cdn.jsdelivr.net/gh/rsek/datasworn@main/pkg/nodejs/@datasworn/starforged/json/starforged.json";
        
        let assetDetails = null;
        let localState = { 
            abilities: [false, false, false], 
            tracker: 0 
        };

        async function init() {
            if (!assetSlug) { 
                document.getElementById('loader').innerText = "ERROR: NO ASSET SPECIFIED"; 
                return; 
            }

            try {
                const res = await fetch(DATA_URL);
                const data = await res.json();
                
                // New logic to find the specific asset in the pkg structure
                for (let catKey in data.assets) {
                    const category = data.assets[catKey];
                    if (category.contents[assetSlug]) {
                        assetDetails = category.contents[assetSlug];
                        assetDetails.categoryName = category.name;
                        break;
                    }
                }

                if (assetDetails) {
                    await syncWithSheet();
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('asset-ui').style.display = 'block';
                    // Optional: Start a heartbeat to keep it synced every 30s
                    setInterval(syncWithSheet, 30000);
                } else {
                    document.getElementById('loader').innerText = `ASSET [${assetSlug}] NOT FOUND IN ARCHIVES`;
                }
            } catch (e) {
                document.getElementById('loader').innerText = "OFFLINE: DATASWORN LINK FAILED";
            }
        }

        async function syncWithSheet() {
            const saved = await loadStats(charId);
            if (!saved) return;
            
            // Look for columns named like "heavy_walker_abilities"
            const savedAbilities = saved[`${assetSlug}_abilities`];
            if (savedAbilities) {
                try { localState.abilities = JSON.parse(savedAbilities); } catch(e) { console.warn("Ability parse failed"); }
            }
            
            // Look for columns named like "heavy_walker_tracker"
            const trackerVal = saved[`${assetSlug}_tracker`];
            localState.tracker = (trackerVal !== undefined) ? parseInt(trackerVal) : (assetDetails.control ? assetDetails.control.value : 0);

            renderAsset();
        }

        function renderAsset() {
            document.getElementById('a-name').innerText = assetDetails.name;
            document.getElementById('a-type').innerText = assetDetails.categoryName;
            
            const abContainer = document.getElementById('abilities');
            abContainer.innerHTML = '';

            assetDetails.abilities.forEach((ab, index) => {
                const isChecked = localState.abilities[index];
                const row = document.createElement('div');
                row.className = 'ability-row';
                row.onclick = () => toggleAbility(index);
                row.innerHTML = `
                    <div class="checkbox ${isChecked ? 'checked' : ''}"></div>
                    <div class="ability-text">${ab.text}</div>
                `;
                abContainer.appendChild(row);
            });

            // Check if the asset has a built-in tracker (like Integrity or Health)
            if (assetDetails.control) {
                document.getElementById('tracker-container').style.display = 'flex';
                document.getElementById('tracker-label').innerText = assetDetails.control.name;
                document.getElementById('tracker-val').innerText = localState.tracker;
            }
        }

        async function toggleAbility(index) {
            localState.abilities[index] = !localState.abilities[index];
            renderAsset();
            await saveStat(charId, `${assetSlug}_abilities`, JSON.stringify(localState.abilities));
            await saveStat(charId, "history_entry", `Asset Modified: ${assetDetails.name} (Ability ${index + 1})`);
        }

        async function adjustTracker(amt) {
            const max = assetDetails.control ? assetDetails.control.max : 6;
            let newVal = localState.tracker + amt;
            if (newVal < 0) newVal = 0;
            if (newVal > max) newVal = max;

            if (newVal !== localState.tracker) {
                localState.tracker = newVal;
                document.getElementById('tracker-val').innerText = localState.tracker;
                await saveStat(charId, `${assetSlug}_tracker`, localState.tracker);
                await saveStat(charId, "history_entry", `${assetDetails.name} Tracker: ${localState.tracker}`);
            }
        }

        init();
    </script>
</body>
</html>
