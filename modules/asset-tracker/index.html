<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { background: #0b0d12; color: #bcdee7; font-family: 'Exo 2', sans-serif; padding: 15px; }
        .asset-list { display: flex; flex-direction: column; gap: 15px; }
        .asset-card { 
            background: #161922; border: 1px solid #454d5d; border-left: 4px solid #00ff9d; 
            padding: 15px; border-radius: 4px; position: relative;
        }
        .asset-name { color: #00ff9d; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .ability-row { display: flex; gap: 10px; margin-top: 8px; font-size: 0.8rem; align-items: flex-start; }
        .ability-check { 
            width: 14px; height: 14px; border: 1px solid #00ff9d; 
            cursor: pointer; flex-shrink: 0; margin-top: 3px;
        }
        .ability-check.active { background: #00ff9d; box-shadow: 0 0 5px #00ff9d; }
        .delete-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #ff0055; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="header" style="display:flex; justify-content:space-between; margin-bottom:15px;">
        <span style="font-size:0.7rem; letter-spacing:2px;">ACTIVE ASSETS</span>
        <button class="save-btn" onclick="syncToCloud()" style="font-size:0.6rem; padding:2px 8px;">MANUAL SYNC</button>
    </div>
    
    <div id="active-assets" class="asset-list">
        </div>

    <script src="../../js/sync.js"></script>
    <script src="../../js/datasworn.js"></script>
    <script>
        let myAssets = []; // Array of objects: { id: "datasworn_id", enabled: [0, 2] }

        // Schema-compliant recursive finder
        function findAssetById(id) {
            if (typeof datasworn === 'undefined') return null;
            const allAssets = findInDatasworn(datasworn.assets, 'asset');
            return allAssets.find(a => a._id === id);
        }

        function findInDatasworn(obj, targetType) {
            let results = [];
            if (!obj || typeof obj !== 'object') return results;
            if (obj.type === targetType) results.push(obj);
            const branches = ['collections', 'contents', 'assets', 'categories'];
            for (const key of branches) {
                if (obj[key]) {
                    for (const childKey in obj[key]) {
                        results = results.concat(findInDatasworn(obj[key][childKey], targetType));
                    }
                }
            }
            return results;
        }

        async function initTracker() {
            if (!GAS_URL) { setTimeout(initTracker, 500); return; }
            
            const stats = await loadStats(charId);
            if (stats && stats.assets) {
                try {
                    myAssets = JSON.parse(stats.assets);
                } catch(e) {
                    myAssets = []; // Fallback for legacy text data
                }
            }
            renderAssets();
        }

        function renderAssets() {
            const container = document.getElementById('active-assets');
            container.innerHTML = "";

            myAssets.forEach((entry, index) => {
                const data = findAssetById(entry.id);
                if (!data) return;

                const card = document.createElement('div');
                card.className = 'asset-card';
                card.innerHTML = `
                    <button class="delete-btn" onclick="removeAsset(${index})">✕</button>
                    <span class="asset-name">${data.name}</span>
                    ${data.abilities.map((ab, i) => `
                        <div class="ability-row">
                            <div class="ability-check ${entry.enabled.includes(i) ? 'active' : ''}" 
                                 onclick="toggleAbility(${index}, ${i})"></div>
                            <span>${ab.text}</span>
                        </div>
                    `).join('')}
                `;
                container.appendChild(card);
            });
        }

        function toggleAbility(assetIdx, abilityIdx) {
            const asset = myAssets[assetIdx];
            if (asset.enabled.includes(abilityIdx)) {
                asset.enabled = asset.enabled.filter(i => i !== abilityIdx);
            } else {
                asset.enabled.push(abilityIdx);
            }
            renderAssets();
            syncToCloud();
        }

        async function removeAsset(index) {
            if (confirm("Decommission this asset?")) {
                myAssets.splice(index, 1);
                renderAssets();
                syncToCloud();
            }
        }

        async function syncToCloud() {
            await saveStat(charId, "assets", JSON.stringify(myAssets));
            console.log("Assets synchronized to neural link.");
        }

        initTracker();
    </script>
</body>
</html>
