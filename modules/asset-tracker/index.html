<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { background: #0b0d12; color: #e2e4e9; padding: 15px; font-family: 'Exo 2', sans-serif; }
        .tracker-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; }
        
        .empty-state { text-align: center; opacity: 0.5; margin-top: 50px; font-style: italic; }
        
        /* Compact Asset Cards for the Tracker */
        .owned-assets { display: flex; flex-direction: column; gap: 15px; }
        .asset-card { 
            background: #1a1c23; border: 1px solid #454d5d; 
            padding: 12px; border-left: 4px solid var(--accent);
        }
        .asset-top { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .asset-name { font-weight: bold; color: var(--accent); font-size: 0.9rem; }
        
        .ability-box { font-size: 0.75rem; line-height: 1.4; background: rgba(0,0,0,0.3); padding: 8px; margin-top: 5px; border-radius: 4px; }
        .ability-box.locked { opacity: 0.4; grayscale: 100%; }
        
        .remove-btn { color: #ff4444; border: none; background: none; font-size: 0.6rem; cursor: pointer; text-transform: uppercase; }
        .remove-btn:hover { text-decoration: underline; }
    </style>
</head>
<body class="theme-starforged">
    <div class="tracker-header">
        <div style="font-size: 0.8rem; letter-spacing: 2px;">ACTIVE ASSETS</div>
        <button class="sync-btn" onclick="refreshTracker()" style="width:auto; margin:0;">REFRESH LINK</button>
    </div>

    <div id="tracker-display" class="owned-assets">
        <div class="empty-state">Scanning manifest...</div>
    </div>

    <script src="../../js/datasworn.js"></script>
    <script src="../../js/sync.js"></script>
    <script>
        let datasworn = null;
        let ownedAssetIds = [];

        async function init() {
            datasworn = await DATASWORN_CONFIG.fetchData(); [cite: 6]
            refreshTracker();
        }

        async function refreshTracker() {
            const display = document.getElementById('tracker-display');
            
            // 1. Load stats from Google Sheet
            const stats = await loadStats(charId); [cite: 7, 21]
            
            if (!stats || !stats.assets) {
                display.innerHTML = '<div class="empty-state">No assets detected in ship manifest.</div>';
                return;
            }

            // 2. Parse the assets string (it's stored as a JSON array in the sheet)
            try {
                ownedAssetIds = JSON.parse(stats.assets); [cite: 18]
            } catch(e) {
                ownedAssetIds = [];
            }

            if (ownedAssetIds.length === 0) {
                display.innerHTML = '<div class="empty-state">Manifest empty. Acquire assets in the Browser.</div>';
                return;
            }

            // 3. Render the cards
            display.innerHTML = "";
            ownedAssetIds.forEach(id => {
                const assetData = findAssetInDatasworn(id);
                if (assetData) renderAssetCard(assetData, id);
            });
        }

        /**
         * Helper to crawl the nested Datasworn object for a specific ID
         */
        function findAssetInDatasworn(targetId) {
            for (let cat in datasworn.assets) {
                for (let sub in datasworn.assets[cat].collections) {
                    const contents = datasworn.assets[cat].collections[sub].contents;
                    if (contents[targetId]) return contents[targetId];
                }
            }
            return null;
        }

        function renderAssetCard(asset, id) {
            const display = document.getElementById('tracker-display');
            const card = document.createElement('div');
            card.className = 'asset-card';
            
            let abilitiesHTML = '';
            asset.abilities.forEach((ab, i) => {
                abilitiesHTML += `<div class="ability-box"><strong>•</strong> ${ab.text}</div>`;
            });

            card.innerHTML = `
                <div class="asset-top">
                    <span class="asset-name">${asset.name.toUpperCase()}</span>
                    <button class="remove-btn" onclick="removeAsset('${id}')">Scrap Asset</button>
                </div>
                ${abilitiesHTML}
            `;
            display.appendChild(card);
        }

        async function removeAsset(id) {
            if (!confirm("Confirm asset decommissioning?")) return;
            
            // Remove from local array
            ownedAssetIds = ownedAssetIds.filter(itemId => itemId !== id);
            
            // Save updated JSON array back to Google Sheet
            await saveStat(charId, "assets", JSON.stringify(ownedAssetIds)); [cite: 7, 24, 29]
            
            // Log to history
            await saveStat(charId, "history_entry", `ASSET REMOVED: ${id}`); [cite: 7, 28, 32]
            
            refreshTracker();
        }

        init();
    </script>
</body>
</html>
