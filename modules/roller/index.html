<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { background: #050508; color: white; font-family: 'Courier New', monospace; padding: 15px; overflow: hidden; }
        
        .roller-container { 
            display: flex; align-items: center; justify-content: center; gap: 20px; 
            border: 1px solid var(--border); padding: 15px; border-radius: 8px;
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0) 100%);
        }

        /* The Dice Visuals */
        .dice-tray { display: flex; gap: 10px; align-items: center; }
        .die { 
            width: 35px; height: 35px; border: 2px solid var(--accent); 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 1.2rem; border-radius: 4px;
            background: rgba(0,0,0,0.5); transition: all 0.2s;
        }
        .die.challenge { border-color: #f87171; color: #f87171; width: 40px; height: 40px; }
        .die.action { border-color: #4ade80; color: #4ade80; }

        /* Animations */
        .rolling { animation: shake 0.1s infinite; opacity: 0.7; filter: blur(1px); }
        
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-1px, -2px) rotate(-1deg); }
            40% { transform: translate(-3px, 0px) rotate(1deg); }
            60% { transform: translate(3px, 2px) rotate(0deg); }
            80% { transform: translate(1px, -1px) rotate(1deg); }
            100% { transform: translate(-1px, 2px) rotate(-1deg); }
        }

        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        button { 
            background: #111; border: 1px solid var(--border); color: white; 
            padding: 8px; cursor: pointer; font-size: 0.65rem; text-transform: uppercase;
        }
        button:hover { background: var(--accent); color: black; }

        #result-text { 
            font-size: 1rem; font-weight: bold; text-align: center; 
            margin-top: 10px; min-height: 1.2rem; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="roller-container">
        <div class="stat-grid">
            <button onclick="animateRoll('edge')">Edge</button>
            <button onclick="animateRoll('heart')">Heart</button>
            <button onclick="animateRoll('iron')">Iron</button>
            <button onclick="animateRoll('shadow')">Shadow</button>
            <button onclick="animateRoll('wits')">Wits</button>
            <input type="number" id="adds" placeholder="+0" style="width:100%; background:#000; border:1px solid #444; color:white; text-align:center;">
        </div>

        <div style="display:flex; flex-direction:column; align-items:center;">
            <div class="dice-tray">
                <div id="die-a" class="die action">?</div>
                <div style="font-size: 1.5rem; opacity: 0.3;">vs</div>
                <div id="die-c1" class="die challenge">?</div>
                <div id="die-c2" class="die challenge">?</div>
            </div>
            <div id="result-text">Initialize Roll...</div>
        </div>
    </div>

    <script src="../../js/sync.js"></script>
    <script>
        async function animateRoll(statName) {
            const resultEl = document.getElementById('result-text');
            const dieA = document.getElementById('die-a');
            const dieC1 = document.getElementById('die-c1');
            const dieC2 = document.getElementById('die-c2');

            // 1. Start Shaking
            dieA.classList.add('rolling');
            dieC1.classList.add('rolling');
            dieC2.classList.add('rolling');
            resultEl.innerText = "Computing Probability...";
            resultEl.style.color = "white";

            // 2. Fetch Stat from Sheet (simultaneous with animation)
            const data = await loadStats(charId);
            const statVal = parseInt(data[statName]) || 0;
            const adds = parseInt(document.getElementById('adds').value) || 0;

            // 3. Fake "Rolling" numbers
            let count = 0;
            const interval = setInterval(() => {
                dieA.innerText = Math.floor(Math.random() * 6) + 1;
                dieC1.innerText = Math.floor(Math.random() * 10) + 1;
                dieC2.innerText = Math.floor(Math.random() * 10) + 1;
                count++;
                if(count > 10) finishRoll();
            }, 60);

            async function finishRoll() {
                clearInterval(interval);
                dieA.classList.remove('rolling');
                dieC1.classList.remove('rolling');
                dieC2.classList.remove('rolling');

                // Real Math
                const actionRoll = Math.floor(Math.random() * 6) + 1;
                const challenge1 = Math.floor(Math.random() * 10) + 1;
                const challenge2 = Math.floor(Math.random() * 10) + 1;
                const score = actionRoll + statVal + adds;

                // Set Visuals
                dieA.innerText = actionRoll;
                dieC1.innerText = challenge1;
                dieC2.innerText = challenge2;

                const vs1 = score > challenge1;
                const vs2 = score > challenge2;

                let res = "";
                if (vs1 && vs2) { res = "Strong Hit"; resultEl.style.color = "#4ade80"; }
                else if (vs1 || vs2) { res = "Weak Hit"; resultEl.style.color = "#facc15"; }
                else { res = "Miss"; resultEl.style.color = "#f87171"; }

                resultEl.innerText = `${res} (Total: ${score})`;
                
                // Sync to Global History
                await saveStat(charId, "history_entry", `${statName.toUpperCase()} [${score}] vs [${challenge1}, ${challenge2}] -> ${res}`);
            }
        }
    </script>
</body>
</html>
