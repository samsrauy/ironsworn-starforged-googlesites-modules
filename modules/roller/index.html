<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { background: rgba(10,10,15,0.95); padding: 10px; border-top: 1px solid var(--border); color: white; font-family: 'Exo 2', sans-serif; }
        .roller-ui { display: flex; align-items: center; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .stat-btn { background: #1a1a1a; border: 1px solid var(--border); color: var(--accent); padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; font-weight: bold; transition: 0.2s; }
        .stat-btn:hover { background: var(--accent); color: black; }
        .result-display { flex-grow: 1; text-align: center; font-size: 0.9rem; letter-spacing: 1px; min-width: 200px; }
        .hit-strong { color: #4ade80; font-weight: bold; text-shadow: 0 0 10px rgba(74,222,128,0.3); }
        .hit-weak { color: #facc15; }
        .hit-miss { color: #f87171; }
        .dice-viz { font-size: 0.6rem; opacity: 0.6; display: block; margin-top: 2px; }
    </style>
</head>
<body>

    <div class="roller-ui">
        <button class="stat-btn" onclick="rollAction('edge')">EDGE</button>
        <button class="stat-btn" onclick="rollAction('heart')">HEART</button>
        <button class="stat-btn" onclick="rollAction('iron')">IRON</button>
        <button class="stat-btn" onclick="rollAction('shadow')">SHADOW</button>
        <button class="stat-btn" onclick="rollAction('wits')">WITS</button>
        
        <div id="result" class="result-display">READY FOR ACTION</div>
        
        <input type="number" id="adds" placeholder="+Adds" style="width:50px; background:#000; border:1px solid #444; color:white; padding:5px; font-size:0.7rem;">
    </div>

    <script src="../../js/sync.js"></script>
    <script>
        async function rollAction(statName) {
            // 1. Fetch current character stats
            const data = await loadStats(charId);
            const statVal = parseInt(data[statName]) || 0;
            const adds = parseInt(document.getElementById('adds').value) || 0;
            
            // 2. The Roll
            const actionDie = Math.floor(Math.random() * 6) + 1;
            const challenge1 = Math.floor(Math.random() * 10) + 1;
            const challenge2 = Math.floor(Math.random() * 10) + 1;
            
            const score = actionDie + statVal + adds;
            
            // 3. Determine Result
            let resultText = "";
            let resultClass = "";
            
            const vs1 = score > challenge1;
            const vs2 = score > challenge2;
            
            if (vs1 && vs2) { resultText = "STRONG HIT"; resultClass = "hit-strong"; }
            else if (vs1 || vs2) { resultText = "WEAK HIT"; resultClass = "hit-weak"; }
            else { resultText = "MISS"; resultClass = "hit-miss"; }

            // 4. Update UI
            document.getElementById('result').innerHTML = `
                <span class="${resultClass}">${resultText}</span>
                <span class="dice-viz">Score: ${score} (${actionDie}+${statVal}+${adds}) vs [${challenge1}, ${challenge2}]</span>
            `;

            // 5. SYNC TO GLOBAL HISTORY
            const logEntry = `${statName.toUpperCase()} Roll: ${resultText} (${score} vs ${challenge1}/${challenge2})`;
            await saveStat(charId, "history_entry", logEntry);
        }
    </script>
</body>
</html>
