<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <h3 id="stat-label">Health</h3>
    <div class="stat-value" id="val">--</div>
    <div>
        <button onclick="adjust(-1)">-</button>
        <button onclick="adjust(1)">+</button>
    </div>

    <script src="../../js/sync.js"></script>
    <script>
        // Get config from URL: ?id=MyChar&stat=health
        const params = new URLSearchParams(window.location.search);
        const charId = params.get('id') || 'default';
        const statName = params.get('stat') || 'health';

        document.getElementById('stat-label').innerText = statName;

        let currentVal = 0;

        async function init() {
            const data = await loadStats(charId);
            currentVal = data[statName] || 0;
            document.getElementById('val').innerText = currentVal;
        }

        function adjust(amt) {
            currentVal += amt;
            document.getElementById('val').innerText = currentVal;
            saveStat(charId, statName, currentVal);
        }

        init();
    </script>
</body>
</html>
