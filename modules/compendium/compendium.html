<div id="compendium-scope">
    <style>
        #compendium-scope { background: #0b0d12; color: #bcdee7; font-family: 'Exo 2', sans-serif; padding: 20px; height: 100%; display: flex; flex-direction: column; }
        #compendium-scope .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #454d5d; padding-bottom: 10px; position: sticky; top: 0; background: #0b0d12; z-index: 10; }
        #compendium-scope .tab-btn { background: #1a1c23; border: 1px solid #454d5d; color: #00ff9d; padding: 8px 15px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; }
        #compendium-scope .tab-btn.active { background: #00ff9d; color: #000; border-color: #00ff9d; }
        
        #compendium-scope #search { width: 100%; padding: 12px; background: #161922; border: 1px solid #454d5d; color: #00ff9d; margin-bottom: 20px; box-sizing: border-box; font-family: 'Share Tech Mono'; }
        
        #compendium-scope .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; overflow-y: auto; flex-grow: 1; }
        #compendium-scope .card { background: #161922; border: 1px solid #454d5d; padding: 15px; border-radius: 4px; position: relative; }
        #compendium-scope .card-tag { font-size: 0.6rem; color: #ff0055; text-transform: uppercase; margin-bottom: 5px; }
        #compendium-scope .card-title { display: block; font-weight: bold; color: #00ff9d; margin-bottom: 10px; font-family: 'Share Tech Mono'; }
        #compendium-scope .card-text { font-size: 0.85rem; line-height: 1.5; color: #aab; }
        
        #compendium-scope .oracle-roll-btn { margin-top: 15px; width: 100%; background: transparent; border: 1px solid #00ff9d; color: #00ff9d; padding: 8px; cursor: pointer; font-family: 'Share Tech Mono'; transition: 0.2s; }
        #compendium-scope .oracle-roll-btn:hover { background: #00ff9d; color: #000; }

        /* Truth Cards */
        #compendium-scope .truth-card { border-color: #454d5d; }
        #compendium-scope .truth-card-done { border-color: #00ff9d33; }
        #compendium-scope .truth-options-container { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        #compendium-scope .truth-option { background: #0b0d12; border: 1px solid #454d5d; padding: 12px; cursor: pointer; transition: 0.2s; border-radius: 3px; }
        #compendium-scope .truth-option:hover { border-color: #00ff9d88; background: rgba(0,255,153,0.03); }
        #compendium-scope .truth-option-selected { border-color: #00ff9d !important; background: rgba(0,255,153,0.07) !important; }
        #compendium-scope .truth-option-indicator { font-family: 'Share Tech Mono'; font-size: 0.6rem; letter-spacing: 2px; color: #454d5d; margin-bottom: 6px; transition: 0.2s; }
        #compendium-scope .truth-option-selected .truth-option-indicator { color: #00ff9d; }
        #compendium-scope .truth-option-text { font-size: 0.82rem; line-height: 1.55; color: #aab; }
        #compendium-scope .truth-quest-starter { margin-top: 10px; padding-top: 8px; border-top: 1px dashed #1a1c23; font-size: 0.78rem; line-height: 1.5; color: #7a7a8a; }
        #compendium-scope .truth-progress { grid-column: 1 / -1; background: #161922; border: 1px solid #454d5d; padding: 12px 15px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }

        /* Truth sub-tables (embedded oracle rolls) */
        #compendium-scope .truth-subtable { margin-top: 12px; padding-top: 10px; border-top: 1px dashed #1a1c23; }
        #compendium-scope .truth-sub-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-family: 'Share Tech Mono'; font-size: 0.6rem; letter-spacing: 1px; color: #f59e0b; }
        #compendium-scope .truth-roll-btn { background: transparent; border: 1px solid #f59e0b; color: #f59e0b; padding: 2px 8px; cursor: pointer; font-family: 'Share Tech Mono'; font-size: 0.6rem; transition: 0.2s; }
        #compendium-scope .truth-roll-btn:hover { background: #f59e0b; color: #000; }
        #compendium-scope .truth-sub-rows { display: flex; flex-direction: column; gap: 4px; }
        #compendium-scope .truth-sub-row { display: flex; gap: 8px; align-items: baseline; padding: 6px 8px; border: 1px solid #1a1c23; cursor: pointer; font-size: 0.78rem; color: #7a7a8a; transition: 0.2s; border-radius: 2px; }
        #compendium-scope .truth-sub-row:hover { border-color: #454d5d; color: #aab; background: rgba(255,255,255,0.02); }
        #compendium-scope .truth-sub-selected { border-color: #f59e0b !important; color: #bcdee7 !important; background: rgba(245,158,11,0.07) !important; }
        #compendium-scope .truth-sub-range { color: #454d5d; font-family: 'Share Tech Mono'; font-size: 0.65rem; min-width: 38px; flex-shrink: 0; }
    </style>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchCompendiumTab('oracle_rollable', this)">Oracles</button>
        <button class="tab-btn" onclick="switchCompendiumTab('move', this)">Moves</button>
        <button class="tab-btn" onclick="switchCompendiumTab('setting_truth', this)">Truths</button>
    </div>

    <input type="text" id="search" placeholder="SEARCH DATASWORN CORE..." onkeyup="filterCompendium()">

    <div id="compendium-grid" class="grid">
        <div style="padding: 20px;">LINKING TO DATASWORN CORE...</div>
    </div>
</div>

<script>
    // --- GLOBAL VOID-LINK MARKDOWN & MODAL ENGINE ---
    if (!window.voidLinkMarkdownEngine) {
        window.voidLinkMarkdownEngine = true;

        window.formatMarkdown = function(txt) {
            if (!txt) return "";
            let html = txt;
            
            const links = [];
            html = html.replace(/\[(.*?)\]\((.*?)\)/g, (match, text, url) => {
                links.push({ text, url });
                return `%%LINK_${links.length - 1}%%`;
            });

            html = html.replace(/\*\*(.*?)\*\*/g, '<b style="color:#bcdee7;">$1</b>');
            html = html.replace(/__(.*?)__/g, '<b style="color:#bcdee7;">$1</b>');
            html = html.replace(/(?<!\w)\*(.*?)\*(?!\w)/g, '<i>$1</i>');
            html = html.replace(/(?<!\w)_(.*?)_(?!\w)/g, '<i>$1</i>'); 
            html = html.replace(/\n/g, '<br>');

            html = html.replace(/%%LINK_(\d+)%%/g, (match, index) => {
                const link = links[index];
                return `<span style="color:#00ff9d; cursor:pointer; text-decoration:underline dashed; text-underline-offset: 3px;" onclick="showCompendiumModal('${link.url}')">${link.text}</span>`;
            });

            return html;
        };

        window.showCompendiumModal = function(nodeId) {
            if (!window.dataswornCore) return;
            
            // Fix: Strip out 'id:', 'move:', 'oracle:' prefixes from the Datasworn strings!
            const cleanId = nodeId.replace(/^[a-zA-Z]+:/, '');
            const node = window.dataswornCore.findNode(cleanId);
            
            let modal = document.getElementById('compendium-modal');
            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'compendium-modal';
                modal.style.cssText = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(5,5,8,0.9); z-index:9999; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(5px);";
                modal.onclick = function(e) { if (e.target === modal) modal.style.display = 'none'; };
                
                modal.innerHTML = `
                    <div style="background:#161922; border:2px solid #00ff9d; padding:30px; max-width:500px; width:90%; max-height:80vh; overflow-y:auto; position:relative; box-shadow: 0 0 30px rgba(0,255,153,0.2); font-family:'Exo 2', sans-serif;">
                        <button onclick="document.getElementById('compendium-modal').style.display='none'" style="position:absolute; top:10px; right:10px; background:transparent; border:none; color:#ff0055; cursor:pointer; font-size:1.2rem; font-family:'Share Tech Mono';">X</button>
                        <div id="compendium-modal-tag" style="font-size:0.7rem; color:#ff0055; letter-spacing:2px; margin-bottom:5px; font-family:'Share Tech Mono';"></div>
                        <h2 id="compendium-modal-title" style="color:#00ff9d; font-family:'Share Tech Mono'; margin-top:0; border-bottom:1px solid #454d5d; padding-bottom:10px;"></h2>
                        <div id="compendium-modal-body" style="color:#aab; font-size:0.9rem; line-height:1.5;"></div>
                    </div>
                `;
                document.body.appendChild(modal);
            }

            if (!node) {
                document.getElementById('compendium-modal-title').innerText = "DATA NOT FOUND";
                document.getElementById('compendium-modal-tag').innerText = "ERROR";
                document.getElementById('compendium-modal-body').innerHTML = `The neural link to <span style="color:#ff0055;">${cleanId}</span> could not be established.`;
            } else {
                document.getElementById('compendium-modal-title').innerText = (node.name || "DATABANK ENTRY").toUpperCase();
                document.getElementById('compendium-modal-tag').innerText = (node.type || "INFO").toUpperCase().replace(/_/g, ' ');
                document.getElementById('compendium-modal-body').innerHTML = window.formatMarkdown(node.text || node.description || "No data available.");
            }
            
            modal.style.display = 'flex';
        };
    }

    (function() {
        const scope = document.getElementById('compendium-scope');
        let fullData = [];
        let currentType = 'oracle_rollable';
        let truthCharData = {};
        let subTableRegistry = {};

        window.initCompendium = async function() {
            try {
                await window.dataswornReady;
                fullData = loadDataswornTab(currentType);
                filterCompendium();
            } catch (err) {
                console.error("Compendium Core Failure:", err);
            }
        };

        function loadDataswornTab(type) {
            if (type === 'setting_truth') return loadTruths();
            return findDataswornItems(window.datasworn, type);
        }

        function loadTruths() {
            // V2: truths live in window.datasworn.truths as a keyed dict
            if (window.datasworn && window.datasworn.truths) {
                return Object.values(window.datasworn.truths);
            }
            // Fallback: recursive search by type field variants
            let results = findDataswornItems(window.datasworn, 'setting_truth');
            if (!results.length) results = findDataswornItems(window.datasworn, 'truth');
            return results;
        }

        function findDataswornItems(obj, type, results = []) {
            if (!obj || typeof obj !== 'object') return results;
            if (obj.type === type) results.push(obj);
            for (let key in obj) {
                if (typeof obj[key] === 'object') findDataswornItems(obj[key], type, results);
            }
            return results;
        }

        window.switchCompendiumTab = async function(type, btn) {
            currentType = type;
            scope.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            fullData = loadDataswornTab(currentType);
            scope.querySelector('#search').value = '';

            if (type === 'setting_truth' && window.gLink && window.charId) {
                try {
                    const data = await window.gLink.loadStatsServer(window.charId);
                    truthCharData = data || {};
                } catch(e) { truthCharData = {}; }
            }

            filterCompendium();
        };

        window.filterCompendium = function() {
            if (currentType === 'setting_truth') { renderTruths(); return; }

            const query = scope.querySelector('#search').value.toLowerCase();
            const grid = scope.querySelector('#compendium-grid');

            const filtered = fullData.filter(item =>
                (item.name && item.name.toLowerCase().includes(query)) ||
                (item._id && item._id.toLowerCase().includes(query))
            );

            grid.innerHTML = filtered.map(item => `
                <div class="card">
                    <div class="card-tag">${currentType.replace(/_/g, ' ')}</div>
                    <span class="card-title">${(item.name || "UNNAMED").toUpperCase()}</span>
                    <div class="card-text">${window.formatMarkdown(item.text || item.description || "")}</div>
                    ${currentType === 'oracle_rollable' ?
                        `<button class="oracle-roll-btn" onclick="consultNeuralOracle('${item.name.replace(/'/g, "\\'")}', '${item._id}')">CONSULT ORACLE</button>` : ''
                    }
                </div>
            `).join('');
        };

        function getTruthSlug(item) {
            const id = item.$id || item._id || item.id || '';
            const parts = id.split('/');
            return parts[parts.length - 1] || id;
        }

        function renderTruths() {
            subTableRegistry = {};
            const grid = scope.querySelector('#compendium-grid');
            const query = scope.querySelector('#search').value.toLowerCase();

            const filtered = fullData.filter(item =>
                !query || (item.name && item.name.toLowerCase().includes(query))
            );

            const total = fullData.length;
            const configured = fullData.filter(item => {
                const slug = getTruthSlug(item);
                const val = truthCharData['truth_' + slug];
                return val !== undefined && val !== null && val !== '';
            }).length;
            const allDone = configured === total && total > 0;

            const progressHtml = `
                <div class="truth-progress">
                    <span style="font-family:'Share Tech Mono'; font-size:0.75rem; color:#aab; letter-spacing:1px;">CAMPAIGN SETUP</span>
                    <span data-truth-counter style="font-family:'Share Tech Mono'; font-size:0.85rem; font-weight:bold; color:${allDone ? '#00ff9d' : '#f59e0b'};">
                        ${configured} / ${total} TRUTHS CONFIGURED
                    </span>
                </div>`;

            const cardsHtml = filtered.map(item => {
                const slug = getTruthSlug(item);
                const savedVal = truthCharData['truth_' + slug];
                const savedIdx = (savedVal !== undefined && savedVal !== '') ? parseInt(savedVal) : -1;
                const options = item.options || [];
                const summary = item.summary || item.description || '';

                const optionsHtml = options.map((opt, idx) => {
                    const isSelected = savedIdx === idx;
                    const rawText = opt.description || opt.summary || opt.text || 'No description available.';
                    const processedText = processTemplates(window.formatMarkdown(rawText), slug);
                    const quest = opt.quest_starter || '';
                    return `
                        <div class="truth-option ${isSelected ? 'truth-option-selected' : ''}"
                             onclick="selectTruth('${slug}', ${idx}, this)">
                            <div class="truth-option-indicator">${isSelected ? '◆ ACTIVE' : '◇ SELECT'}</div>
                            <div class="truth-option-text">${processedText}</div>
                            ${quest ? `<div class="truth-quest-starter"><span style="color:#f59e0b;font-size:0.6rem;letter-spacing:1px;font-family:'Share Tech Mono';">QUEST STARTER</span><br>${window.formatMarkdown(quest)}</div>` : ''}
                        </div>`;
                }).join('');

                return `
                    <div class="card truth-card ${savedIdx >= 0 ? 'truth-card-done' : ''}">
                        <div class="card-tag">SETTING TRUTH</div>
                        <span class="card-title">${(item.name || 'UNKNOWN TRUTH').toUpperCase()}</span>
                        ${summary ? `<div class="card-text" style="font-style:italic;margin-bottom:10px;">${window.formatMarkdown(summary)}</div>` : ''}
                        <div class="truth-options-container">${optionsHtml || '<div style="color:#454d5d;font-size:0.8rem;">No options found in data.</div>'}</div>
                    </div>`;
            }).join('');

            grid.innerHTML = progressHtml + cardsHtml;
        }

        function processTemplates(html, truthSlug) {
            return html.replace(/\{\{table:([\w\/]+)\}\}/g, (match, tableId) => {
                const node = window.dataswornCore ? window.dataswornCore.findNode(tableId) : null;
                const rows = node ? (node.rows || []) : [];
                if (!rows.length) return `<span style="color:#454d5d;font-size:0.75rem;">[table not found: ${tableId}]</span>`;

                const uid = 'sub_' + truthSlug + '_' + tableId.replace(/\//g, '_');
                const subKey = 'truth_' + truthSlug + '_sub';
                const saved = truthCharData[subKey] !== undefined ? String(truthCharData[subKey]) : '';

                subTableRegistry[uid] = {
                    subKey,
                    texts: rows.map(r => r.text || r.result || r.summary || '')
                };

                const rowsHtml = rows.map((row, i) => {
                    const txt = row.text || row.result || row.summary || '';
                    const range = row.min !== undefined ? `${row.min}–${row.max}` : String(i + 1);
                    const sel = saved === String(i);
                    return `<div class="truth-sub-row${sel ? ' truth-sub-selected' : ''}" data-uid="${uid}" data-idx="${i}" onclick="pickSubRow('${uid}', ${i})">
                        <span class="truth-sub-range">${range}</span>
                        <span>${window.formatMarkdown(txt)}</span>
                    </div>`;
                }).join('');

                return `<div class="truth-subtable">
                    <div class="truth-sub-header">
                        <span>SELECT OR ROLL</span>
                        <button class="truth-roll-btn" onclick="rollSubRow('${uid}')">ROLL</button>
                    </div>
                    <div class="truth-sub-rows" id="${uid}">${rowsHtml}</div>
                </div>`;
            });
        }

        window.pickSubRow = async function(uid, idx) {
            const reg = subTableRegistry[uid];
            if (!reg) return;

            document.querySelectorAll(`.truth-sub-row[data-uid="${uid}"]`).forEach(el => {
                el.classList.toggle('truth-sub-selected', parseInt(el.dataset.idx) === idx);
            });

            truthCharData[reg.subKey] = idx;
            if (window.gLink && window.charId) {
                await window.gLink.saveStatServer(window.charId, reg.subKey, idx);
            }
        };

        window.rollSubRow = function(uid) {
            const reg = subTableRegistry[uid];
            if (!reg || !reg.texts.length) return;
            pickSubRow(uid, Math.floor(Math.random() * reg.texts.length));
        };

        window.selectTruth = async function(slug, optionIdx, clickedEl) {
            truthCharData['truth_' + slug] = optionIdx;

            const card = clickedEl.closest('.truth-card');
            card.querySelectorAll('.truth-option').forEach(el => {
                el.classList.remove('truth-option-selected');
                el.querySelector('.truth-option-indicator').innerText = '◇ SELECT';
            });
            clickedEl.classList.add('truth-option-selected');
            clickedEl.querySelector('.truth-option-indicator').innerText = '◆ ACTIVE';
            card.classList.add('truth-card-done');

            const total = fullData.length;
            const configured = fullData.filter(item => {
                const s = getTruthSlug(item);
                const v = truthCharData['truth_' + s];
                return v !== undefined && v !== null && v !== '';
            }).length;
            const counter = scope.querySelector('[data-truth-counter]');
            if (counter) {
                counter.innerText = `${configured} / ${total} TRUTHS CONFIGURED`;
                counter.style.color = configured === total ? '#00ff9d' : '#f59e0b';
            }

            if (window.gLink && window.charId) {
                await window.gLink.saveStatServer(window.charId, 'truth_' + slug, optionIdx);
            }
        };

        window.consultNeuralOracle = async function(name, id) {
            const node = window.dataswornCore.findNode(id);
            const roll = Math.floor(Math.random() * 100) + 1;
            let resultText = "Data corrupted or missing in databanks.";

            // Scan the Datasworn table rows for our roll
            if (node && node.rows) {
                for (let r of node.rows) {
                    let min = r.min !== undefined ? r.min : (r.roll && r.roll.min !== undefined ? r.roll.min : r.roll);
                    let max = r.max !== undefined ? r.max : (r.roll && r.roll.max !== undefined ? r.roll.max : r.roll);
                    
                    if (roll >= min && roll <= max) {
                        resultText = r.text || r.summary || r.result || "Unknown Result";
                        break;
                    }
                }
            }

            // Clean up Markdown logic to make it look good in the Journal
            const finalDocOutput = `[ORACLE: ${name.toUpperCase()}]\nRolled: ${roll}\nResult: ${resultText}`;
            
            // Give instant feedback on the screen
            alert(`[${name}]\nRolled: ${roll}\n\n${resultText.replace(/<[^>]*>?/gm, '')}`);
            
            // Push it to Google Docs!
            if (window.gLink && typeof window.gLink.logServer === 'function') {
                await window.gLink.logServer(window.charId, finalDocOutput);
            }
        };

        initCompendium();
    })();
</script>
