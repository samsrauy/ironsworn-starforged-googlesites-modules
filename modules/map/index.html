<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { overflow: hidden; margin: 0; background: #050508; font-family: 'Courier New', monospace; }
        #map-canvas { display: block; cursor: crosshair; }
        
        .map-overlay { position: absolute; top: 15px; left: 15px; pointer-events: none; z-index: 10; }
        .region-badge { background: var(--accent); color: black; padding: 2px 8px; font-weight: bold; font-size: 0.7rem; text-transform: uppercase; border-radius: 3px; }
        .coords { color: rgba(255,255,255,0.4); font-size: 0.6rem; margin-top: 5px; }

        .map-controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 10; background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid var(--border); border-radius: 8px; }
        
        select, button { background: #1a1a1a; color: white; border: 1px solid var(--border); padding: 5px 10px; font-size: 0.7rem; cursor: pointer; border-radius: 4px; }
        button:hover { background: var(--accent); color: black; }
        
        .legend { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); padding: 10px; border: 1px solid var(--border); font-size: 0.6rem; color: white; pointer-events: none; }
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .box { width: 8px; height: 8px; }
    </style>
</head>
<body>

    <div class="map-overlay">
        <div id="region-display" class="region-badge">Scanning Sector...</div>
        <div id="mouse-coords" class="coords">X: 0 Y: 0</div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="box" style="background:#facc15"></div> Settlement</div>
        <div class="legend-item"><div class="box" style="background:#5dade2"></div> Uncharted Waypoint</div>
        <div class="legend-item"><div class="box" style="border:1px solid #4ade80"></div> Known Passage</div>
    </div>

    <canvas id="map-canvas"></canvas>

    <div class="map-controls">
        <select id="region-select">
            <option value="terminus">Terminus (3 Passages)</option>
            <option value="outlands" selected>Outlands (2 Passages)</option>
            <option value="expanse">Expanse (1 Passage)</option>
        </select>
        <button onclick="generateSector()">Generate New Sector</button>
        <button onclick="syncMap()">Manual Sync</button>
    </div>

    <script src="../../js/sync.js"></script>
    <script>
        const canvas = document.getElementById('map-canvas');
        const ctx = canvas.getContext('2d');
        let sectorData = { region: 'outlands', stars: [], paths: [] };
        
        const REGION_RULES = {
            'terminus': { passages: 3, settlements: 5, waypoints: 10 },
            'outlands': { passages: 2, settlements: 3, waypoints: 8 },
            'expanse':  { passages: 1, settlements: 2, waypoints: 6 }
        };

        async function init() {
            window.addEventListener('resize', resize);
            canvas.addEventListener('mousemove', (e) => {
                document.getElementById('mouse-coords').innerText = `X: ${e.offsetX} Y: ${e.offsetY}`;
            });
            resize();
            startHeartbeat(syncMap, 45000);
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            draw();
        }

        async function syncMap() {
            const data = await loadStats(charId);
            if (data.map_state) {
                sectorData = JSON.parse(data.map_state);
                document.getElementById('region-display').innerText = sectorData.region;
                draw();
            } else {
                generateSector();
            }
        }

        async function generateSector() {
            const region = document.getElementById('region-select').value;
            const rules = REGION_RULES[region];
            const stars = [];
            const paths = [];

            // 1. Generate Stars & Settlements
            const totalObjects = rules.settlements + rules.waypoints;
            for (let i = 0; i < totalObjects; i++) {
                const isSettlement = i < rules.settlements;
                stars.push({
                    id: i,
                    name: isSettlement ? "Settle-" + (i+1) : "Waypoint-" + i,
                    x: Math.random() * (canvas.width - 200) + 100,
                    y: Math.random() * (canvas.height - 200) + 100,
                    type: isSettlement ? 'settlement' : 'waypoint'
                });
            }

            // 2. Generate Legal Passages (Rules-based)
            const settlements = stars.filter(s => s.type === 'settlement');
            for (let i = 0; i < rules.passages; i++) {
                if (i < settlements.length - 1) {
                    // Connect Settlement to Settlement
                    paths.push({ from: settlements[i].id, to: settlements[i+1].id });
                } else if (settlements.length > 0) {
                    // Connect Settlement to Map Edge (Representing route to another sector)
                    paths.push({ from: settlements[0].id, to: 'edge', edgeX: Math.random() > 0.5 ? 0 : canvas.width, edgeY: Math.random() * canvas.height });
                }
            }

            sectorData = { region, stars, paths };
            await saveStat(charId, "map_state", JSON.stringify(sectorData));
            await saveStat(charId, "history_entry", `Generated new sector in the ${region.toUpperCase()}`);
            syncMap();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Background Grid
            ctx.strokeStyle = "rgba(255,255,255,0.03)";
            for(let i=0; i<canvas.width; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
            for(let i=0; i<canvas.height; i+=50) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }

            // Draw Passages (Known Routes)
            ctx.lineWidth = 2;
            ctx.strokeStyle = "#4ade80";
            sectorData.paths.forEach(p => {
                const s1 = sectorData.stars.find(s => s.id === p.from);
                ctx.beginPath();
                ctx.moveTo(s1.x, s1.y);
                if (p.to === 'edge') {
                    ctx.lineTo(p.edgeX, p.edgeY);
                } else {
                    const s2 = sectorData.stars.find(s => s.id === p.to);
                    ctx.lineTo(s2.x, s2.y);
                }
                ctx.stroke();
            });

            // Draw Objects
            sectorData.stars.forEach(s => {
                const isSettle = s.type === 'settlement';
                
                // Outer Glow
                ctx.shadowBlur = 15;
                ctx.shadowColor = isSettle ? "#facc15" : "#5dade2";
                
                ctx.fillStyle = isSettle ? "#facc15" : "#5dade2";
                if (isSettle) {
                    ctx.fillRect(s.x - 6, s.y - 6, 12, 12);
                } else {
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, 5, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.shadowBlur = 0; // Reset glow
                ctx.fillStyle = "white";
                ctx.font = "bold 10px 'Courier New'";
                ctx.fillText(s.name, s.x + 15, s.y + 5);
            });
        }

        init();
    </script>
</body>
</html>
