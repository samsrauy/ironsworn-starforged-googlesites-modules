<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { background: #0b0d12; color: #00ff9d; font-family: 'Exo 2', sans-serif; overflow: hidden; margin: 0; }
        #navigation-deck { position: relative; width: 100vw; height: 100vh; background: radial-gradient(circle, #0a0a1a 0%, #000 100%); }
        .waypoint { position: absolute; width: 12px; height: 12px; background: #fff; border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px #fff; z-index: 10; }
        .waypoint-label { position: absolute; top: 15px; left: -20px; font-size: 0.6rem; color: #00ff9d; white-space: nowrap; }
        #player-ship { position: absolute; width: 20px; height: 20px; border: 2px solid #ff0055; border-radius: 50%; transition: all 0.8s ease; opacity: 0; z-index: 20; }
        #player-ship.active { opacity: 1; }
        .status-overlay { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); border: 1px solid #ff0055; color: #ff0055; padding: 10px; font-size: 0.7rem; text-transform: uppercase; }
    </style>
</head>
<body class="theme-starforged">
    <div id="navigation-deck">
        <div id="map-area"></div>
        <div id="player-ship"></div>
        <div id="status-msg" class="status-overlay">Initializing Nav-Link...</div>
    </div>

    <script src="../../js/sync.js"></script>
    <script>
        const LOCS = [
            { name: "Ironholde", x: 20, y: 30 },
            { name: "Vanguard Prime", x: 45, y: 60 },
            { name: "The Drift", x: 75, y: 25 }
        ];

        async function initMap() {
            if (!charId) return;
            const stats = await loadStats(charId); // Corrected function name
            if (stats && stats.ship_pos && stats.ship_pos !== "0,0") {
                const [x, y] = stats.ship_pos.split(',');
                moveShip(x, y);
                document.getElementById('status-msg').style.display = 'none';
            } else {
                document.getElementById('status-msg').innerText = "Select Entry Vector";
            }
            renderPoints();
        }

        function renderPoints() {
            const area = document.getElementById('map-area');
            LOCS.forEach(l => {
                const dot = document.createElement('div');
                dot.className = 'waypoint';
                dot.style.left = l.x + "%"; dot.style.top = l.y + "%";
                dot.onclick = () => updatePos(l);
                dot.innerHTML = `<div class="waypoint-label">${l.name}</div>`;
                area.appendChild(dot);
            });
        }

        async function updatePos(l) {
            moveShip(l.x, l.y);
            document.getElementById('status-msg').style.display = 'none';
            await saveStat(charId, "ship_pos", `${l.x},${l.y}`);
            await saveStat(charId, "history_entry", `NAV: Docked at ${l.name}`);
        }

        function moveShip(x, y) {
            const s = document.getElementById('player-ship');
            s.classList.add('active');
            s.style.left = x + "%"; s.style.top = y + "%";
        }

        setTimeout(initMap, 500);
    </script>
</body>
</html>
