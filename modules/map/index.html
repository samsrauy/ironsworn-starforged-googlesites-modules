<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/style.css">
    <title>Starforged Nav-Computer: Hex-Scan</title>
    <style>
        body { overflow: hidden; margin: 0; background: #050508; font-family: 'Courier New', monospace; color: white; }
        #map-canvas { display: block; cursor: crosshair; touch-action: none; }
        
        .map-overlay { position: absolute; top: 15px; left: 15px; pointer-events: none; z-index: 10; }
        .region-badge { background: var(--accent); color: black; padding: 4px 12px; font-weight: bold; font-size: 0.8rem; text-transform: uppercase; border-radius: 3px; }
        
        .map-controls { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 12px; z-index: 10; background: rgba(10,10,15,0.95); 
            padding: 12px 20px; border: 1px solid #333; border-radius: 8px;
            backdrop-filter: blur(10px); align-items: center;
        }

        .data-panel {
            position: absolute; top: 15px; right: 15px; width: 220px;
            background: rgba(0,0,0,0.85); border: 1px solid #444;
            padding: 15px; font-size: 0.7rem; pointer-events: none;
            max-height: 70vh; overflow-y: auto;
        }
        
        .loc-card { border-left: 2px solid var(--accent); padding-left: 8px; margin-bottom: 12px; }
        .loc-name { font-weight: bold; color: var(--accent); text-transform: uppercase; }
        .loc-desc { color: #aaa; font-style: italic; margin-top: 2px; }

        select, button { background: #111; color: white; border: 1px solid #444; padding: 6px 14px; font-size: 0.7rem; cursor: pointer; border-radius: 4px; }
        button:hover { background: var(--accent); color: black; }
    </style>
</head>
<body>

    <div class="map-overlay">
        <div id="region-display" class="region-badge">SCANNER STANDBY</div>
        <div id="coords" style="font-size:0.6rem; color:#666; margin-top:5px;">HEX: 0,0</div>
    </div>

    <div id="data-panel" class="data-panel">
        <div style="color:var(--accent); border-bottom:1px solid #333; padding-bottom:5px; margin-bottom:10px;">SECTOR MANIFEST</div>
        <div id="manifest-list">Scan sector to populate...</div>
    </div>

    <canvas id="map-canvas"></canvas>

    <div class="map-controls">
        <select id="region-select">
            <option value="terminus">Terminus</option>
            <option value="outlands" selected>Outlands</option>
            <option value="expanse">Expanse</option>
        </select>
        <button onclick="generateSector()">Deep Scan</button>
        <button onclick="syncMap()">Sync</button>
    </div>

    <script src="../../js/sync.js"></script>
    <script>
        const canvas = document.getElementById('map-canvas');
        const ctx = canvas.getContext('2d');
        const HEX_SIZE = 30;
        let sectorData = { stars: [] };
        let shipPos = { q: 0, r: 0 }; // Hex Coordinates
        let isDragging = false;

        const NAMES = ["Acheron", "Borealis", "Cicada", "Driftwood", "Elysium", "Fenrir", "Golgotha"];
        const TYPES = ["Mining Colony", "Research Station", "Trading Hub", "Relay Station", "Outpost"];
        const DESCS = ["Atmospheric processors humming.", "Automated defense turrets active.", "Salvage crews working the debris.", "Corporate neon flickering.", "Heavily fortified bunkers."];

        function hexToPixel(q, r) {
            const x = HEX_SIZE * (Math.sqrt(3) * q + Math.sqrt(3)/2 * r);
            const y = HEX_SIZE * (3/2 * r);
            return { x: x + canvas.width/2, y: y + canvas.height/2 };
        }

        function pixelToHex(x, y) {
            const dx = x - canvas.width/2;
            const dy = y - canvas.height/2;
            const q = (Math.sqrt(3)/3 * dx - 1/3 * dy) / HEX_SIZE;
            const r = (2/3 * dy) / HEX_SIZE;
            return axialRound(q, r);
        }

        function axialRound(q, r) {
            let x = q, z = r, y = -x-z;
            let rx = Math.round(x), ry = Math.round(y), rz = Math.round(z);
            let dx = Math.abs(rx - x), dy = Math.abs(ry - y), dz = Math.abs(rz - z);
            if (dx > dy && dx > dz) rx = -ry-rz;
            else if (dy > dz) ry = -rx-rz;
            else rz = -rx-ry;
            return { q: rx, r: rz };
        }

        async function generateSector() {
            const region = document.getElementById('region-select').value;
            const count = region === 'terminus' ? 6 : region === 'outlands' ? 4 : 2;
            const stars = [];
            
            for(let i=0; i<count; i++) {
                stars.push({
                    q: Math.floor(Math.random()*8 - 4),
                    r: Math.floor(Math.random()*8 - 4),
                    name: NAMES[Math.floor(Math.random()*NAMES.length)] + "-" + Math.floor(Math.random()*99),
                    type: TYPES[Math.floor(Math.random()*TYPES.length)],
                    desc: DESCS[Math.floor(Math.random()*DESCS.length)]
                });
            }
            sectorData = { region, stars };
            updateManifest();
            await saveStat(charId, "map_state", JSON.stringify(sectorData));
            draw();
        }

        function updateManifest() {
            const list = document.getElementById('manifest-list');
            list.innerHTML = sectorData.stars.map(s => `
                <div class="loc-card">
                    <div class="loc-name">${s.name}</div>
                    <div style="font-size:0.6rem; color:var(--accent)">${s.type}</div>
                    <div class="loc-desc">${s.desc}</div>
                </div>
            `).join('');
        }

        function drawHex(q, r, color = "rgba(0, 255, 153, 0.05)") {
            const pos = hexToPixel(q, r);
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = 2 * Math.PI / 6 * (i + 0.5);
                const x = pos.x + HEX_SIZE * Math.cos(angle);
                const y = pos.y + HEX_SIZE * Math.sin(angle);
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.strokeStyle = color;
            ctx.stroke();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Grid
            for(let q=-10; q<=10; q++) {
                for(let r=-10; r<=10; r++) drawHex(q, r);
            }

            // Draw Stars/Waypoints
            sectorData.stars.forEach(s => {
                const pos = hexToPixel(s.q, s.r);
                ctx.fillStyle = "#facc15";
                ctx.shadowBlur = 10; ctx.shadowColor = "#facc15";
                ctx.beginPath(); ctx.arc(pos.x, pos.y, 5, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
                ctx.font = "8px Arial";
                ctx.fillText(s.name, pos.x + 10, pos.y + 3);
            });

            // Draw Starship (The proportionate triangle)
            const sPos = hexToPixel(shipPos.q, shipPos.r);
            ctx.fillStyle = "#ff4e50";
            ctx.shadowBlur = 15; ctx.shadowColor = "#ff4e50";
            ctx.beginPath();
            ctx.moveTo(sPos.x, sPos.y - 8);
            ctx.lineTo(sPos.x - 6, sPos.y + 6);
            ctx.lineTo(sPos.x + 6, sPos.y + 6);
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // Interaction Logic
        canvas.addEventListener('mousedown', e => {
            const h = pixelToHex(e.offsetX, e.offsetY);
            if(h.q === shipPos.q && h.r === shipPos.r) isDragging = true;
        });

        window.addEventListener('mousemove', e => {
            const h = pixelToHex(e.offsetX, e.offsetY);
            document.getElementById('coords').innerText = `HEX: ${h.q}, ${h.r}`;
            if(isDragging) {
                shipPos = h;
                draw();
            }
        });

        window.addEventListener('mouseup', async () => {
            if(isDragging) {
                isDragging = false;
                await saveStat(charId, "ship_pos", JSON.stringify(shipPos));
            }
        });

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            draw();
        }

        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
