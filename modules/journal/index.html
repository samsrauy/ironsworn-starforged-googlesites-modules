<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { background: #050508; color: #e0e0e0; font-family: 'Exo 2', sans-serif; padding: 10px; overflow: hidden; }
        .journal-container { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; height: 92vh; }
        
        /* Narrative Section */
        .journal-wrap { flex: 2; display: flex; flex-direction: column; }
        textarea { 
            flex: 1; width: 100%; background: rgba(10,10,15,0.8); 
            color: #d1d5db; border: 1px solid #333; border-radius: 4px;
            padding: 15px; font-family: 'Exo 2', sans-serif; resize: none;
            line-height: 1.6; outline: none; transition: 0.3s;
            box-sizing: border-box;
        }
        textarea:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 255, 153, 0.1); }
        
        /* Log Section */
        .log-wrap { flex: 1; display: flex; flex-direction: column; min-height: 150px; }
        .log-area { 
            flex: 1; border: 1px solid #222; border-radius: 4px; 
            background: #000; overflow-y: auto; padding: 10px;
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
        }
        .log-entry { 
            font-family: 'Courier New', monospace; font-size: 0.75rem; 
            padding: 4px 0; border-bottom: 1px solid #111;
            animation: slideIn 0.2s ease-out;
        }
        .log-time { opacity: 0.3; margin-right: 8px; font-size: 0.6rem; }
        .log-text { color: #aaa; }
        
        /* Highlights */
        .strong-hit { color: var(--accent); font-weight: bold; }
        .weak-hit { color: #fbbf24; }
        .miss { color: #f87171; font-weight: bold; }
        .match { color: #a855f7; text-decoration: underline; }
        .system-msg { color: #555; font-style: italic; }

        label { font-size: 0.6rem; opacity: 0.5; letter-spacing: 2px; margin-bottom: 5px; display: block; text-transform: uppercase; }

        @keyframes slideIn { 
            from { opacity: 0; transform: translateY(5px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .save-status { font-size: 0.5rem; color: var(--accent); opacity: 0; transition: 0.5s; }
        .save-status.visible { opacity: 1; }
    </style>
</head>
<body>

    <div class="journal-container">
        <div class="journal-wrap">
            <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                <label>Captain's Log / Narrative</label>
                <span id="save-indicator" class="save-status">DATA UPLOADED</span>
            </div>
            <textarea id="journal-input" placeholder="Recording thoughts for the archive..." oninput="autoSave()"></textarea>
        </div>

        <div class="log-wrap">
            <label>Neural Link Activity (Last 20 Entries)</label>
            <div id="log-list" class="log-area">
                <div class="log-entry"><span class="log-time">SYS</span> <span class="log-text">Awaiting telemetry...</span></div>
            </div>
        </div>
    </div>

    <script src="../../js/sync.js"></script>
    <script>
        let saveTimeout;

        async function init() {
            // 1. Initial Load
            const saved = await loadStats(charId);
            if (saved) {
                if (saved.journal) document.getElementById('journal-input').value = saved.journal;
                if (saved.history) renderLog(saved.history);
            }
            
            // 2. Continuous Sync for the Log
            setInterval(async () => {
                const data = await loadStats(charId);
                if (data && data.history) renderLog(data.history);
            }, 10000);
        }

        // Auto-save prevents hitting the Google quota too hard while you type
        function autoSave() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(async () => {
                const text = document.getElementById('journal-input').value;
                const status = document.getElementById('save-indicator');
                
                await saveStat(charId, "journal", text);
                
                status.classList.add('visible');
                setTimeout(() => status.classList.remove('visible'), 2000);
            }, 2000); // Wait for 2 seconds of silence before saving
        }

        function renderLog(historyData) {
            const container = document.getElementById('log-list');
            const isAtBottom = container.scrollHeight - container.clientHeight <= container.scrollTop + 50;

            let entries = [];
            
            // Handle both JSON arrays and newline-separated strings
            try {
                entries = typeof historyData === 'string' ? JSON.parse(historyData) : historyData;
            } catch (e) {
                // If it's not JSON, assume it's a newline-separated string from the Sheet
                entries = historyData.split('\n').filter(line => line.trim() !== "");
            }

            // Limit to last 20 to keep performance snappy
            const displayEntries = entries.slice(-20);

            container.innerHTML = '';
            
            displayEntries.forEach(entry => {
                const div = document.createElement('div');
                div.className = 'log-entry';
                
                // If entry is an object {time, text}, use it. If string, use raw.
                const time = entry.time || "--:--";
                const text = entry.text || entry;

                let styledText = text
                    .replace(/STRONG HIT/g, '<span class="strong-hit">STRONG HIT</span>')
                    .replace(/WEAK HIT/g, '<span class="weak-hit">WEAK HIT</span>')
                    .replace(/MISS/g, '<span class="miss">MISS</span>')
                    .replace(/MATCH!/g, '<span class="match">MATCH!</span>')
                    .replace(/MOMENTUM BURN:|Asset Modified:|ROLL/g, '<span class="system-msg">$&</span>');

                div.innerHTML = `<span class="log-time">${time}</span> <span class="log-text">${styledText}</span>`;
                container.appendChild(div);
            });

            if (isAtBottom) {
                container.scrollTop = container.scrollHeight;
            }
        }

        init();
    </script>
</body>
</html>
