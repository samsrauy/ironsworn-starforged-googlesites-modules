<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body style="background:#0b0d12; color:#e2e4e9; padding:15px; font-family:'Exo 2'; display:flex; flex-direction:column; height:95vh;">
    <div style="font-size:0.7rem; margin-bottom:10px;">
        <span id="sync-indicator" style="width:8px; height:8px; border-radius:50%; background:#444; display:inline-block;"></span> LOG CHANNEL
        <span id="last-saved" style="float:right; opacity:0.5;">BOOTING...</span>
    </div>
    <textarea id="journal-input" style="flex-grow:1; background:#161922; color:#bcdee7; border:1px solid #454d5d; padding:15px; font-family:'Share Tech Mono'; outline:none; resize:none;"></textarea>
    <button class="save-btn" onclick="commitEntry()" style="background:#00ff9d; color:#000; border:none; padding:12px; font-weight:bold; cursor:pointer; margin-top:10px;">COMMIT TO ARCHIVE</button>

    <script src="../../js/sync.js"></script>
    <script>
        const textarea = document.getElementById('journal-input');
        const indicator = document.getElementById('sync-indicator');
        const timestamp = document.getElementById('last-saved');

        async function init() {
            // Wait for Bootstrap to find the GAS_URL
            if (!GAS_URL) { setTimeout(init, 500); return; }
            const stats = await loadStats(charId);
            if (stats) {
                indicator.style.background = "#00ff9d";
                textarea.value = stats.journal || "";
                timestamp.innerText = "LINK ESTABLISHED";
            }
        }

        async function commitEntry() {
            const content = textarea.value.trim();
            if (!content) return;
            timestamp.innerText = "TRANSMITTING...";
            await saveStat(charId, "journal", content);
            timestamp.innerText = "LAST ARCHIVE: " + new Date().toLocaleTimeString();
        }
        init();
    </script>
</body>
</html>
