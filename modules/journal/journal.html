<div id="journal-scope">
    <style>
        #journal-scope { background: #0b0d12; color: #bcdee7; padding: 20px; font-family: 'Exo 2'; display: flex; flex-direction: column; height: 100%; }
        #journal-scope .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.7rem; letter-spacing: 1px; }
        #journal-scope #sync-indicator { width: 8px; height: 8px; border-radius: 50%; background: #444; display: inline-block; margin-right: 5px; }
        #journal-scope #sync-indicator.online { background: #00ff9d; box-shadow: 0 0 8px #00ff9d; }
        #journal-scope textarea { 
            width: 100%; height: 200px; background: #161922; color: #00ff9d; border: 1px solid #454d5d; 
            padding: 15px; font-family: 'Share Tech Mono'; font-size: 1rem; outline: none; resize: none; border-radius: 4px;
        }
        #journal-scope .history-feed { margin-top: 20px; border-top: 1px solid #1a1c23; padding-top: 15px; overflow-y: auto; max-height: 200px; }
        #journal-scope .history-item { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 4px; border-left: 2px solid #454d5d; font-size: 0.8rem; margin-bottom: 8px; }
        #journal-scope .btn { border: none; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-family: 'Exo 2'; }
        #journal-scope .save-btn { background: #00ff9d; color: #000; }
        #journal-scope .draft-btn { background: #1a1c23; color: #454d5d; border: 1px solid #454d5d; }
    </style>

    <div class="header">
        <div><span id="sync-indicator"></span> ACTIVE BUFFER</div>
        <div id="journal-status">READY...</div>
    </div>

    <textarea id="journal-input" placeholder="START TRANSMISSION..."></textarea>

    <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 10px; margin-top: 15px;">
        <button class="btn draft-btn" onclick="saveJournalDraft()">Cache Draft</button>
        <button class="btn save-btn" onclick="commitJournalToArchive()">Commit to Archive</button>
    </div>

    <div class="header" style="margin-top:20px;"><span>RECENT UPLINKS</span></div>
    <div id="history-feed" class="history-feed"></div>
</div>

<script>
    (async function initJournal() {
        const status = document.getElementById('journal-status');
        const textarea = document.getElementById('journal-input');
        
        try {
            // Accessing global scope instead of window.parent
            if (window.dataswornReady) await window.dataswornReady;
            const stats = await loadStats(window.charId);
            
            if (stats) {
                document.getElementById('sync-indicator').classList.add('online');
                textarea.value = stats.journal_draft || "";
                if (stats.history) renderJournalHistory(stats.history);
            }
        } catch (err) {
            status.innerText = "LINK SEVERED";
            console.error("Journal Error:", err);
        }
    })();

    function renderJournalHistory(historyArray) {
        const feed = document.getElementById('history-feed');
        feed.innerHTML = historyArray.slice(-5).reverse().map(entry => `
            <div class="history-item">
                <div style="font-size:0.6rem; color:#ff0055;">ARCHIVED ENTRY</div>
                <div>${entry}</div>
            </div>
        `).join('');
    }

    async function saveJournalDraft() {
        const content = document.getElementById('journal-input').value;
        document.getElementById('journal-status').innerText = "CACHING...";
        await saveStat(window.charId, "journal_draft", content);
        document.getElementById('journal-status').innerText = "CACHED: " + new Date().toLocaleTimeString();
    }

    async function commitJournalToArchive() {
        const textarea = document.getElementById('journal-input');
        const content = textarea.value.trim();
        if (!content || !confirm("Archive this entry?")) return;

        document.getElementById('journal-status').innerText = "TRANSMITTING...";
        await saveStat(window.charId, "history_entry", content);
        await saveStat(window.charId, "journal_draft", "");
        textarea.value = "";
        document.getElementById('journal-status').innerText = "ARCHIVE SECURED";
        // Refresh local history view
        const updatedStats = await loadStats(window.charId);
        if (updatedStats.history) renderJournalHistory(updatedStats.history);
    }
</script>
