<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .track-card { 
            border: 1px solid var(--border); background: rgba(255,255,255,0.02); 
            padding: 12px; border-radius: 8px; margin-bottom: 15px; position: relative;
        }
        .track-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .track-title { font-size: 0.8rem; font-weight: bold; color: var(--accent); text-transform: uppercase; }
        
        /* The Progress Bar (10 Boxes) */
        .progress-bar { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; margin: 10px 0; }
        .box { height: 20px; border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .box.filled { background: var(--accent); color: black; font-weight: bold; }
        
        /* The Crisis Clock (Circular or Segments) */
        .clock-grid { display: flex; gap: 5px; margin-top: 5px; }
        .clock-seg { width: 30px; height: 30px; border: 2px solid #f87171; border-radius: 4px; cursor: pointer; }
        .clock-seg.active { background: #f87171; box-shadow: 0 0 8px #f87171; }

        .add-btn { width: 100%; padding: 10px; border: 1px dashed var(--border); background: none; color: var(--text); cursor: pointer; margin-top: 10px; opacity: 0.6; }
        .add-btn:hover { opacity: 1; border-color: var(--accent); color: var(--accent); }
        
        .delete-btn { font-size: 0.6rem; color: #f87171; cursor: pointer; background: none; border: none; }
    </style>
</head>
<body>

    <div id="loader">Syncing Sector Data...</div>

    <div id="sheet-ui" style="display:none; padding: 20px;">
        
        <div id="vitals-area"></div>

        <section>
            <div class="section-header">Active Progress & Clocks</div>
            <div id="dynamic-tracks">
                </div>
            <button class="add-btn" onclick="addNewTrack()">+ New Progress Track / Clock</button>
        </section>

    </div>

    <script src="../../js/sync.js"></script>
    <script>
        let tracks = []; // Array of {id: timestamp, title: "Vow", type: "progress", value: 0, max: 10}

        async function init() {
            document.body.classList.add(`theme-${game}`);
            startHeartbeat(refreshTracks, 35000);
            document.getElementById('loader').style.display = 'none';
            document.getElementById('sheet-ui').style.display = 'block';
        }

        async function refreshTracks() {
            const data = await loadStats(charId);
            if (data.active_tracks) {
                tracks = JSON.parse(data.active_tracks);
                renderTracks();
            }
        }

        function renderTracks() {
            const container = document.getElementById('dynamic-tracks');
            container.innerHTML = '';

            tracks.forEach((track, index) => {
                const card = document.createElement('div');
                card.className = 'track-card';
                
                let trackHTML = `
                    <div class="track-header">
                        <input class="track-title" style="background:none; border:none; color:var(--accent);" value="${track.title}" onchange="updateTrackTitle(${index}, this.value)">
                        <button class="delete-btn" onclick="deleteTrack(${index})">✕ Delete</button>
                    </div>
                `;

                if (track.type === 'clock') {
                    trackHTML += `<div class="clock-grid">`;
                    for (let i = 1; i <= track.max; i++) {
                        trackHTML += `<div class="clock-seg ${i <= track.value ? 'active' : ''}" onclick="updateTrackValue(${index}, ${i})"></div>`;
                    }
                    trackHTML += `</div>`;
                } else {
                    trackHTML += `<div class="progress-bar">`;
                    for (let i = 1; i <= 10; i++) {
                        trackHTML += `<div class="box ${i <= track.value ? 'filled' : ''}" onclick="updateTrackValue(${index}, ${i})">${i <= track.value ? 'X' : ''}</div>`;
                    }
                    trackHTML += `</div>`;
                }

                card.innerHTML = trackHTML;
                container.appendChild(card);
            });
        }

        async function addNewTrack() {
            const type = confirm("Press OK for Progress Track, Cancel for Crisis Clock (6-seg)") ? "progress" : "clock";
            const title = prompt("Enter Name (e.g., 'Reactor Meltdown' or 'Vow: Find the Pilot')") || "New Track";
            
            tracks.push({
                id: Date.now(),
                title: title,
                type: type,
                value: 0,
                max: type === "clock" ? 6 : 10
            });
            
            await saveTracks();
        }

        async function updateTrackValue(index, val) {
            // Toggle logic for clocks: if clicking the same segment, reset to 0 or previous
            tracks[index].value = (tracks[index].value === val) ? val - 1 : val;
            await saveTracks();
        }

        async function updateTrackTitle(index, val) {
            tracks[index].title = val;
            await saveTracks();
        }

        async function deleteTrack(index) {
            if (confirm("Delete this track forever?")) {
                tracks.splice(index, 1);
                await saveTracks();
            }
        }

        async function saveTracks() {
            renderTracks();
            await saveStat(charId, "active_tracks", JSON.stringify(tracks));
            // Log to history
            await saveStat(charId, "history_entry", `Tracks updated: ${tracks.length} active.`);
        }

        init();
    </script>
</body>
</html>
