<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { background: #0b0d12; color: #bcdee7; font-family: 'Exo 2', sans-serif; padding: 20px; overflow-y: auto; }
        .section-title { font-size: 0.8rem; letter-spacing: 3px; color: #00ff9d; border-bottom: 1px solid #00ff9d; padding-bottom: 5px; margin: 20px 0 10px 0; text-transform: uppercase; }
        
        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .stat-box { background: #161922; border: 1px solid #454d5d; padding: 10px; text-align: center; border-radius: 4px; }
        .stat-val { display: block; font-size: 1.5rem; color: #00ff9d; font-weight: bold; }
        .stat-label { font-size: 0.6rem; text-transform: uppercase; opacity: 0.7; }

        /* Progress Tracks */
        .track-container { background: rgba(22, 25, 34, 0.6); padding: 15px; border-radius: 4px; margin-bottom: 15px; border-left: 3px solid #454d5d; }
        .track-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .rank-badge { font-size: 0.6rem; padding: 2px 6px; border: 1px solid #00ff9d; color: #00ff9d; text-transform: uppercase; border-radius: 3px; }
        
        .progress-bar { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; margin-bottom: 10px; }
        .box { height: 25px; border: 1px solid #454d5d; position: relative; background: #050508; }
        .tick { position: absolute; background: #00ff9d; box-shadow: 0 0 5px rgba(0,255,153,0.5); }
        .tick-1 { top: 4px; left: 4px; width: 6px; height: 6px; }
        .tick-2 { top: 4px; right: 4px; width: 6px; height: 6px; }
        .tick-3 { bottom: 4px; left: 4px; width: 6px; height: 6px; }
        .tick-4 { bottom: 4px; right: 4px; width: 6px; height: 6px; }

        .btn-group { display: flex; gap: 10px; }
        .mark-btn { background: #00ff9d; color: #000; border: none; padding: 5px 10px; font-size: 0.7rem; font-weight: bold; cursor: pointer; border-radius: 2px; }
        .mark-btn:hover { background: #fff; }
        
        select.rank-select { background: #000; color: #00ff9d; border: 1px solid #454d5d; font-size: 0.7rem; }
    </style>
</head>
<body>

    <h2 id="display-name" style="color:#00ff9d; margin-bottom:20px;">VOID-LINK: LOADING...</h2>

    <div class="stats-grid">
        <div class="stat-box"><span class="stat-label">Edge</span><span class="stat-val" id="stat-edge">0</span></div>
        <div class="stat-box"><span class="stat-label">Heart</span><span class="stat-val" id="stat-heart">0</span></div>
        <div class="stat-box"><span class="stat-label">Iron</span><span class="stat-val" id="stat-iron">0</span></div>
        <div class="stat-box"><span class="stat-label">Shadow</span><span class="stat-val" id="stat-shadow">0</span></div>
        <div class="stat-box"><span class="stat-label">Wits</span><span class="stat-val" id="stat-wits">0</span></div>
    </div>

    <div class="section-title">Legacy Tracks</div>
    <div id="legacy-list"></div>

    <div class="section-title">Active Vows</div>
    <div id="vows-list"></div>
    <button class="mark-btn" onclick="addVow()" style="margin-top:10px;">+ SWEAR IRON VOW</button>

    <script src="../../js/sync.js"></script>
    <script>
        const RANKS = {
            troublesome: 12, // 3 boxes
            dangerous: 8,    // 2 boxes
            formidable: 4,   // 1 box
            extreme: 2,      // 2 ticks
            epic: 1          // 1 tick
        };

        let charData = {
            stats: { edge: 1, heart: 1, iron: 1, shadow: 1, wits: 1 },
            legacies: [
                { id: 'discovery', name: 'Discovery', ticks: 0, rank: 'epic' },
                { id: 'bonds', name: 'Bonds', ticks: 0, rank: 'epic' },
                { id: 'combat', name: 'Combat', ticks: 0, rank: 'epic' }
            ],
            vows: []
        };

        async function initSheet() {
            if (!GAS_URL) { setTimeout(initSheet, 500); return; }
            document.getElementById('display-name').innerText = `PILOT: ${charId.toUpperCase()}`;
            
            const cloud = await loadStats(charId);
            if (cloud) {
                if (cloud.edge) charData.stats = { edge: cloud.edge, heart: cloud.heart, iron: cloud.iron, shadow: cloud.shadow, wits: cloud.wits };
                if (cloud.legacies) charData.legacies = JSON.parse(cloud.legacies);
                if (cloud.vows) charData.vows = JSON.parse(cloud.vows);
            }
            renderAll();
        }

        function renderAll() {
            // Render Stats
            Object.keys(charData.stats).forEach(s => {
                document.getElementById(`stat-${s}`).innerText = charData.stats[s];
            });

            // Render Legacies
            const legList = document.getElementById('legacy-list');
            legList.innerHTML = charData.legacies.map((l, i) => renderTrack(l, i, 'legacies')).join('');

            // Render Vows
            const vowList = document.getElementById('vows-list');
            vowList.innerHTML = charData.vows.map((v, i) => renderTrack(v, i, 'vows')).join('');
        }

        function renderTrack(track, index, type) {
            let boxes = '';
            for (let i = 0; i < 10; i++) {
                boxes += `<div class="box">`;
                for (let t = 1; t <= 4; t++) {
                    if (track.ticks >= (i * 4) + t) boxes += `<div class="tick tick-${t}"></div>`;
                }
                boxes += `</div>`;
            }

            return `
                <div class="track-container">
                    <div class="track-header">
                        <input type="text" value="${track.name}" class="vow-input" onchange="updateTrackData('${type}', ${index}, 'name', this.value)">
                        <select class="rank-select" onchange="updateTrackData('${type}', ${index}, 'rank', this.value)">
                            ${Object.keys(RANKS).map(r => `<option value="${r}" ${track.rank === r ? 'selected' : ''}>${r}</option>`).join('')}
                        </select>
                    </div>
                    <div class="progress-bar">${boxes}</div>
                    <div class="btn-group">
                        <button class="mark-btn" onclick="markProgress('${type}', ${index})">REACH MILESTONE</button>
                        <button class="mark-btn" style="background:#ff0055" onclick="clearTrack('${type}', ${index})">RESET</button>
                    </div>
                </div>
            `;
        }

        function markProgress(type, index) {
            const track = charData[type][index];
            const increment = RANKS[track.rank] || 1;
            track.ticks = Math.min(40, track.ticks + increment);
            saveAndRefresh();
        }

        function updateTrackData(type, index, field, value) {
            charData[type][index][field] = value;
            saveAndRefresh();
        }

        function addVow() {
            charData.vows.push({ name: "New Iron Vow", ticks: 0, rank: "dangerous" });
            saveAndRefresh();
        }

        function clearTrack(type, index) {
            if(confirm("Zero out this progress track?")) {
                charData[type][index].ticks = 0;
                saveAndRefresh();
            }
        }

        async function saveAndRefresh() {
            renderAll();
            await saveStat(charId, "legacies", JSON.stringify(charData.legacies));
            await saveStat(charId, "vows", JSON.stringify(charData.vows));
        }

        initSheet();
    </script>
</body>
</html>
