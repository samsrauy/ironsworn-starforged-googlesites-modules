<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        /* Local layout for the roller */
        .roller-container { max-width: 400px; margin: 0 auto; }
        select { 
            width: 100%; 
            padding: 10px; 
            margin-bottom: 12px; 
            background: #1a1c23; 
            color: var(--text); 
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 1rem;
        }
        .roll-display { 
            margin-top: 20px; 
            font-weight: bold; 
            color: var(--accent); 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .result-text { 
            margin-top: 8px; 
            padding: 15px; 
            border-left: 4px solid var(--accent); 
            background: rgba(255,255,255,0.03);
            min-height: 50px;
            line-height: 1.5;
        }
        #loader { text-align: center; padding: 20px; font-style: italic; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="roller-container">
        <div id="loader">Accessing Datasworn Archives...</div>

        <div id="roller-ui" style="display:none;">
            <label for="category-select" style="font-size: 0.8rem; opacity: 0.6;">CATEGORY</label>
            <select id="category-select" onchange="updateTableList()"></select>
            
            <label for="table-select" style="font-size: 0.8rem; opacity: 0.6;">ORACLE TABLE</label>
            <select id="table-select"></select>
            
            <button onclick="roll()" style="width: 100%; padding: 12px;">Roll Oracle</button>
            
            <div id="roll-out" class="roll-display"></div>
            <div id="result-out" class="result-text">Select a table and roll to begin your journey.</div>
        </div>
    </div>

    <script src="../../js/datasworn.js"></script>
    <script src="../../js/sync.js"></script>

    <script>
        /** * 2. GLOBAL STATE 
         * We store data here so all functions can access it.
         */
        let oracleData = null;
        const params = new URLSearchParams(window.location.search);
        const game = params.get('game') || 'starforged'; 
        const charId = params.get('id') || 'global';

        /** * 3. THE "WORKERS" (Helper Functions)
         * These are defined but don't run until called.
         */
        function getOracleResult(table, roll) {
            return table.find(row => roll >= row.floor && roll <= row.ceil);
        }

        function updateTableList() {
            const catKey = document.getElementById('category-select').value;
            const tableSelect = document.getElementById('table-select');
            tableSelect.innerHTML = ''; 
            
            const category = oracleData.oracles[catKey];
            const tables = category.oracles || {};
            
            Object.keys(tables).forEach(tKey => {
                let opt = document.createElement('option');
                opt.value = tKey;
                opt.innerText = tables[tKey].name;
                tableSelect.appendChild(opt);
            });
        }

        async function roll() {
            const catKey = document.getElementById('category-select').value;
            const tKey = document.getElementById('table-select').value;
            
            const oracle = oracleData.oracles[catKey].oracles[tKey];
            const dieRoll = Math.floor(Math.random() * 100) + 1;
            const entry = getOracleResult(oracle.table, dieRoll);
            
            // Update UI
            document.getElementById('roll-out').innerText = `${oracle.name}: ${dieRoll}`;
            document.getElementById('result-out').innerText = entry.result;

            // Sync to Google Sheet
            if (typeof saveStat === "function") {
                saveStat(charId, "history_entry", `ORACLE [${dieRoll}]: ${entry.result} (${oracle.name})`);
            }
        }

        /** * 4. THE "BRAIN" (Initialization)
         * This sets up the theme and loads the data.
         */
        async function init() {
            // A. Set the Theme immediately based on URL
            document.body.classList.add(`theme-${game}`);

            // B. Fetch data from Datasworn
            oracleData = await fetchDatasworn(game, 'oracles/core.json');
            
            if (oracleData) {
                const catSelect = document.getElementById('category-select');
                
                // Populating Categories
                Object.keys(oracleData.oracles).forEach(catKey => {
                    let opt = document.createElement('option');
                    opt.value = catKey;
                    opt.innerText = oracleData.oracles[catKey].name;
                    catSelect.appendChild(opt);
                });
                
                updateTableList();
                document.getElementById('loader').style.display = 'none';
                document.getElementById('roller-ui').style.display = 'block';
            } else {
                document.getElementById('loader').innerText = "System Error: Datasworn Unreachable.";
            }
        }

        /** * 5. EXECUTION
         * This actually starts the app.
         */
        init();
    </script>
</body>
</html>
