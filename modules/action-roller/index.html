<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .roller-container { max-width: 400px; margin: auto; padding: 15px; text-align: center; }
        .roll-setup { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; }
        
        select, input { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--border); padding: 8px; border-radius: 4px; }
        
        .roll-btn { 
            width: 100%; padding: 12px; background: var(--accent); color: black; 
            font-weight: bold; border: none; border-radius: 4px; cursor: pointer; font-size: 1.1rem;
        }
        .roll-btn:hover { filter: brightness(1.2); }

        /* Result Display */
        .result-card { 
            margin-top: 20px; padding: 15px; border: 2px solid var(--border); border-radius: 8px; 
            display: none; animation: slideIn 0.3s ease;
        }
        .dice-display { display: flex; justify-content: center; gap: 20px; margin: 10px 0; font-family: 'Courier New', monospace; }
        .die { padding: 10px; border: 1px solid var(--border); border-radius: 4px; background: rgba(255,255,255,0.05); }
        .action-die { border-color: var(--accent); color: var(--accent); font-size: 1.5rem; font-weight: bold; }
        .challenge-die { font-size: 1.2rem; opacity: 0.8; }

        .outcome-text { font-size: 1.4rem; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        .strong-hit { color: #4ade80; border-color: #4ade80; }
        .weak-hit { color: #facc15; border-color: #facc15; }
        .miss { color: #f87171; border-color: #f87171; }
        .match-alert { font-size: 0.7rem; color: #f87171; letter-spacing: 2px; margin-top: 5px; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="roller-container">
        <div class="roll-setup">
            <select id="stat-select">
                <option value="edge">Edge</option>
                <option value="heart">Heart</option>
                <option value="iron">Iron</option>
                <option value="shadow">Shadow</option>
                <option value="wits">Wits</option>
                <option value="0">None (+0)</option>
            </select>
            <input type="number" id="add-val" placeholder="+ Adds" style="width: 70px;">
        </div>

        <button class="roll-btn" onclick="performRoll()">ROLL DICE</button>

        <div id="result-area" class="result-card">
            <div id="match-msg" class="match-alert" style="display:none;">⚠️ A MATCH! (Sway or Twist)</div>
            <div class="dice-display">
                <div class="die action-die" id="res-action">?</div>
                <div style="align-self:center; opacity:0.3;">vs</div>
                <div class="die challenge-die" id="res-c1">?</div>
                <div class="die challenge-die" id="res-c2">?</div>
            </div>
            <div id="res-outcome" class="outcome-text">Result</div>
            <div id="res-total" style="font-size: 0.8rem; opacity: 0.6; margin-top: 5px;"></div>
        </div>
    </div>

    <script src="../../js/sync.js"></script>
    <script>
        const game = new URLSearchParams(window.location.search).get('game') || 'starforged';
        document.body.classList.add(`theme-${game}`);

        async function performRoll() {
            // 1. Get Values
            const statName = document.getElementById('stat-select').value;
            const adds = parseInt(document.getElementById('add-val').value) || 0;
            
            // 2. Fetch Stat from Sheet
            const saved = await loadStats(charId);
            const statVal = statName === "0" ? 0 : (parseInt(saved[statName]) || 0);

            // 3. Roll Dice
            const d6 = Math.floor(Math.random() * 6) + 1;
            const c1 = Math.floor(Math.random() * 10) + 1;
            const c2 = Math.floor(Math.random() * 10) + 1;

            // 4. Calculate Action Score (Cap at 10)
            let actionScore = d6 + statVal + adds;
            if (actionScore > 10) actionScore = 10;

            // 5. Determine Outcome
            let outcome = "";
            let cssClass = "";
            
            if (actionScore > c1 && actionScore > c2) {
                outcome = "Strong Hit";
                cssClass = "strong-hit";
            } else if (actionScore > c1 || actionScore > c2) {
                outcome = "Weak Hit";
                cssClass = "weak-hit";
            } else {
                outcome = "Miss";
                cssClass = "miss";
            }

            // 6. UI Update
            const area = document.getElementById('result-area');
            area.style.display = "block";
            area.className = `result-card ${cssClass}`;
            
            document.getElementById('res-action').innerText = actionScore;
            document.getElementById('res-c1').innerText = c1;
            document.getElementById('res-c2').innerText = c2;
            document.getElementById('res-outcome').innerText = outcome;
            document.getElementById('res-total').innerText = `(${d6} + ${statVal} stat + ${adds} adds)`;
            
            document.getElementById('match-msg').style.display = (c1 === c2) ? "block" : "none";

            // 7. SYNC TO LOG
            const logMsg = `Rolled ${statName.toUpperCase()}: [${actionScore}] vs [${c1}, ${c2}] -> **${outcome}** ${c1 === c2 ? '(MATCH!)' : ''}`;
            await saveStat(charId, "history_entry", logMsg);
        }
    </script>
</body>
</html>
